<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScribbleCode V5 - Smart Scan</title>
    <style>
        :root { --primary: #3a7794; --bg: #1a1a1d; --card: #25252b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { background: var(--card); padding: 20px; border-radius: 20px; text-align: center; max-width: 500px; width: 95%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: calc(100% - 24px); padding: 12px; margin-bottom: 15px; border-radius: 8px; border: none; background: #111; color: white; font-size: 16px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        button, .file-label { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 13px; text-decoration: none; }
        .btn-download { background: #2e7d32; }
        canvas { background: #fdfaf0; border-radius: 10px; width: 100%; height: auto; image-rendering: pixelated; }
        .output-box { margin-top: 15px; padding: 15px; background: #000; color: #40ff40; font-family: monospace; border-radius: 8px; text-align: left; min-height: 20px; border-left: 4px solid var(--primary); }
        #fileInput { display: none; }
        .info { font-size: 11px; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>ScribbleCode V5</h2>
        <input type="text" id="inputText" value="Jona" placeholder="Text...">
        
        <div class="btn-grid">
            <button onclick="generate()">Generieren</button>
            <button class="btn-download" onclick="download()">Speichern</button>
            <label class="file-label" for="fileInput">Hochladen</label>
            <button onclick="scan()">Scan starten</button>
        </div>
        <input type="file" id="fileInput" accept="image/*" onchange="handleUpload(event)">

        <canvas id="mainCanvas" width="600" height="600"></canvas>
        <div id="status" class="info">Bereit.</div>
        <div id="result" class="output-box">Ergebnis erscheint hier...</div>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const BLUE = [58, 119, 148];

        function generate() {
            const text = document.getElementById('inputText').value;
            const w = canvas.width, h = canvas.height;
            
            // Background
            ctx.fillStyle = "#fdfaf0";
            ctx.fillRect(0, 0, w, h);
            
            // Grid
            ctx.strokeStyle = "#e8eae0";
            ctx.lineWidth = 2;
            for(let i=1; i<6; i++) {
                ctx.beginPath(); ctx.moveTo(w*i/6, 0); ctx.lineTo(w*i/6, h); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, h*i/6); ctx.lineTo(w, h*i/6); ctx.stroke();
            }

            // Data Assembly: Sync-Header (0, 15) + Data + Sync-Footer (15, 0)
            const encoder = new TextEncoder();
            const bytes = encoder.encode(text);
            let nibbles = [0, 15]; // Start Marker
            bytes.forEach(b => { nibbles.push(b >> 4); nibbles.push(b & 0x0F); });
            nibbles.push(15, 0); // End Marker

            const px = w * 0.15, py = h * 0.2, ry = h * 0.3;
            const sx = (w - 2 * px) / (nibbles.length - 1);

            ctx.beginPath();
            ctx.strokeStyle = `rgb(${BLUE[0]},${BLUE[1]},${BLUE[2]})`;
            ctx.lineWidth = 14;
            ctx.lineJoin = "round";
            ctx.lineCap = "round";

            for (let i = 0; i < nibbles.length; i++) {
                const x = px + i * sx;
                const v = nibbles[i] / 15;
                const y = (i % 2 === 0) ? py + v * ry : h - py - v * ry;
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();
            document.getElementById('status').innerText = `Code mit ${nibbles.length} Ankerpunkten erstellt.`;
        }

        function handleUpload(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    scan();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        function scan() {
            const w = canvas.width, h = canvas.height;
            const data = ctx.getImageData(0, 0, w, h).data;
            let points = [];

            // 1. Color extraction
            for (let x = 0; x < w; x++) {
                let sy = 0, c = 0;
                for (let y = 0; y < h; y++) {
                    const i = (y * w + x) * 4;
                    if (data[i+2] > data[i] + 30 && data[i+2] > data[i+1] + 30) { // Blue dominant
                        sy += y; c++;
                    }
                }
                if (c > 3) points.push({x, y: sy / c});
            }

            if (points.length < 10) return;

            // 2. Peak Detection with plateau prevention
            let peaks = [];
            const lookaround = 10;
            for (let i = lookaround; i < points.length - lookaround; i++) {
                let isMax = true, isMin = true;
                for (let j = -lookaround; j <= lookaround; j++) {
                    if (points[i+j].y < points[i].y) isMax = false;
                    if (points[i+j].y > points[i].y) isMin = false;
                }
                if (isMax || isMin) {
                    // Plateau check: only add if far enough from last peak
                    if (peaks.length === 0 || points[i].x - peaks[peaks.length-1].x > 15) {
                        peaks.push(points[i]);
                        ctx.fillStyle = "red";
                        ctx.beginPath(); ctx.arc(points[i].x, points[i].y, 5, 0, 7); ctx.fill();
                    }
                }
            }

            // 3. Decoding
            const py = h * 0.2, ry = h * 0.3;
            // Filter start/stop marker: we ignore the first 2 and last 2 peaks
            let dataPeaks = peaks.slice(2, -2);
            let nibbles = [];

            dataPeaks.forEach((p, i) => {
                // i+2 because we sliced the first 2
                let val;
                if ((i+2) % 2 === 0) val = (p.y - py) / ry;
                else val = (h - py - p.y) / ry;
                nibbles.push(Math.max(0, Math.min(15, Math.round(val * 15))));
            });

            let finalBytes = [];
            for(let i=0; i < nibbles.length; i+=2) {
                if(nibbles[i+1] !== undefined) {
                    finalBytes.push((nibbles[i] << 4) | nibbles[i+1]);
                }
            }

            try {
                const text = new TextDecoder().decode(new Uint8Array(finalBytes));
                document.getElementById('result').innerText = text || "Kein Text erkannt";
                document.getElementById('status').innerText = `Erfolg! ${peaks.length} Spitzen analysiert.`;
            } catch(e) {
                document.getElementById('result').innerText = "Dekodierungsfehler.";
            }
        }

        function download() {
            const a = document.createElement('a');
            a.download = 'scribble.png';
            a.href = canvas.toDataURL();
            a.click();
        }

        window.onload = generate;
    </script>
</body>
</html>
