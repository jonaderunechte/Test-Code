<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Elite-Check: Geschichte Kursstufe</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #eceff1; padding: 20px; color: #263238; }
        .container { max-width: 900px; margin: auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { border-left: 8px solid #f1c40f; padding-left: 15px; color: #37474f; }
        .question-box { margin-bottom: 30px; padding: 20px; border: 1px solid #cfd8dc; border-radius: 8px; }
        .type-label { font-size: 0.8rem; text-transform: uppercase; color: #78909c; font-weight: bold; display: block; margin-bottom: 10px; }
        .question-text { font-size: 1.25rem; font-weight: 600; margin-bottom: 20px; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        label { padding: 12px; border: 1px solid #cfd8dc; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        label:hover { background: #f5f5f5; }
        input[type="text"] { width: 100%; padding: 12px; font-size: 1rem; border: 2px solid #3498db; border-radius: 6px; }
        .btn-next { background: #2c3e50; color: white; border: none; padding: 15px 30px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 20px; float: right; }
        .btn-next:hover { background: #1a252f; }
        
        /* Result Table */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #cfd8dc; text-align: left; }
        th { background: #f8f9fa; }
        .wrong { color: #c0392b; font-weight: bold; }
        .correct { color: #27ae60; font-weight: bold; }
        .score-big { font-size: 4rem; color: #2c3e50; text-align: center; margin: 10px 0; }
        .np-big { font-size: 2rem; text-align: center; color: #e67e22; margin-bottom: 30px; }
        .hidden { display: none; }
        .clearfix::after { content: ""; clear: both; display: table; }
    </style>
</head>
<body>

<div class="container">
    <div id="quiz-section">
        <div id="progress">Frage 1 von 10</div>
        <h1>Kursstufen-Prüfung</h1>
        <div class="question-box">
            <span id="type-indicator" class="type-label">Typ</span>
            <div id="q-text" class="question-text">Frage wird geladen...</div>
            <div id="input-area" class="options"></div>
        </div>
        <div class="clearfix">
            <button class="btn-next" onclick="nextQuestion()">Nächste Frage →</button>
        </div>
    </div>

    <div id="result-section" class="hidden">
        <h1>Prüfungsbericht</h1>
        <div class="score-big" id="final-raw">0/10</div>
        <div class="np-big" id="final-np">0 Notenpunkte</div>
        <div id="feedback-text" style="text-align: center; margin-bottom: 20px;"></div>
        
        <table>
            <thead>
                <tr>
                    <th>Frage</th>
                    <th>Deine Antwort</th>
                    <th>Richtig wäre</th>
                </tr>
            </thead>
            <tbody id="review-table"></tbody>
        </table>
        <br>
        <button class="btn-next" onclick="location.reload()" style="float: none; display: block; margin: auto;">Neustart</button>
    </div>
</div>

<script>
const pool = [
    { t: "text", q: "Wie heißt der Fachbegriff für die Einteilung der NS-Gesellschaft in 'wertvolle' und 'minderwertige' Menschen?", a: "Volksgemeinschaft" },
    { t: "text", q: "Welcher Artikel der Weimarer Verfassung regelte die Notverordnungen des Reichspräsidenten? (Nur Zahl)", a: "48" },
    { t: "text", q: "Wie nennt man die gewaltsame Anpassung aller Organisationen an die NS-Ideologie 1933?", a: "Gleichschaltung" },
    { t: "text", q: "Welcher Kanzler leitete 1930 das erste Präsidialkabinett?", a: "Brüning" },
    { t: "multi", q: "Welche Merkmale kennzeichnen die liberale Demokratie?", o: ["Pluralismus", "Gewaltenteilung", "Einparteiensystem", "Menschenrechte"], c: [0,1,3] },
    { t: "multi", q: "Was sind Merkmale des 'Gilded Age' in den USA?", o: ["Big Business", "Wirtschaftsboom", "Staatliche Planwirtschaft", "Korruption"], c: [0,1,3] },
    { t: "multi", q: "Was waren Ursachen für das Scheitern von Weimar?", o: ["Weltwirtschaftskrise", "Stabilität der Mitte", "Antidemokratisches Denken", "Schwäche des Reichspräsidenten"], c: [0,2] },
    { t: "multi", q: "Welche Aspekte gehören zur NS-Ideologie?", o: ["Antisemitismus", "Pazifismus", "Lebensraum im Osten", "Sozialdarwinismus"], c: [0,2,3] },
    { t: "single", q: "Was bedeutet 'Modernisierung von oben' im Kaiserreich?", o: ["Einigung durch Bismarck und Militär", "Revolution der Arbeiter", "Wahl durch das Volk"], c: 0 },
    { t: "single", q: "Welche Funktion hatte die 'Kaderpartei' im Sowjetkommunismus?", o: ["Elite als Vorhut der Revolution", "Zusammentreffen aller Meinungen", "Reine Sportorganisation"], c: 0 },
    { t: "text", q: "Wie heißt die Ideologie, die das 'Recht des Stärkeren' auf Menschenrassen überträgt?", a: "Sozialdarwinismus" },
    { t: "text", q: "In welchem Jahr begann die Weltwirtschaftskrise?", a: "1929" },
    { t: "single", q: "Wer ernannte Hitler zum Reichskanzler?", o: ["Hindenburg", "Ludendorff", "Ebert", "Das Volk"], c: 0 },
    { t: "multi", q: "Was sind Begleiterscheinungen der Hochmoderne um 1900?", o: ["Urbanisierung", "Beschleunigung", "Entstehung von Massenmedien", "Agrarisierung"], c: [0,1,2] },
    { t: "text", q: "Was war der zentrale Kampfbegriff der NS-Außenpolitik bezüglich Territorien?", a: "Lebensraum" }
];

let questions = [];
let currentIdx = 0;
let userAnswers = [];
let score = 0;

function init() {
    questions = pool.sort(() => 0.5 - Math.random()).slice(0, 10);
    renderQuestion();
}

function renderQuestion() {
    const q = questions[currentIdx];
    document.getElementById('progress').innerText = `Frage ${currentIdx + 1} von 10`;
    document.getElementById('q-text').innerText = q.q;
    const area = document.getElementById('input-area');
    area.innerHTML = "";

    if(q.t === "text") {
        document.getElementById('type-indicator').innerText = "Transfer: Fachbegriff eingeben";
        area.innerHTML = `<input type="text" id="text-ans" placeholder="Antwort hier tippen..." autocomplete="off">`;
    } else if(q.t === "single") {
        document.getElementById('type-indicator').innerText = "Wahl: Nur eine Antwort richtig";
        q.o.forEach((opt, i) => {
            area.innerHTML += `<label><input type="radio" name="ans" value="${i}"> ${opt}</label>`;
        });
    } else {
        document.getElementById('type-indicator').innerText = "Analyse: Mehrere Antworten können richtig sein";
        q.o.forEach((opt, i) => {
            area.innerHTML += `<label><input type="checkbox" name="ans" value="${i}"> ${opt}</label>`;
        });
    }
}

function nextQuestion() {
    const q = questions[currentIdx];
    let userVal;

    if(q.t === "text") {
        userVal = document.getElementById('text-ans').value.trim();
    } else if(q.t === "single") {
        const selected = document.querySelector('input[name="ans"]:checked');
        userVal = selected ? parseInt(selected.value) : null;
    } else {
        const selected = Array.from(document.querySelectorAll('input[name="ans"]:checked')).map(el => parseInt(el.value));
        userVal = selected;
    }

    userAnswers.push(userVal);
    checkScore(q, userVal);

    currentIdx++;
    if(currentIdx < 10) renderQuestion(); else showResults();
}

function checkScore(q, val) {
    if(q.t === "text") {
        if(val.toLowerCase() === q.a.toLowerCase()) score++;
    } else if(q.t === "single") {
        if(val === q.c) score++;
    } else {
        if(JSON.stringify(val.sort()) === JSON.stringify(q.c.sort())) score++;
    }
}

function showResults() {
    document.getElementById('quiz-section').classList.add('hidden');
    document.getElementById('result-section').classList.remove('hidden');
    
    const np = [0,0,0,1,3,5,7,9,11,13,15][score];
    document.getElementById('final-raw').innerText = score + "/10";
    document.getElementById('final-np').innerText = np + " Notenpunkte";
    
    const table = document.getElementById('review-table');
    questions.forEach((q, i) => {
        let u = userAnswers[i];
        let correctStr = q.t === "text" ? q.a : (q.t === "single" ? q.o[q.c] : q.c.map(idx => q.o[idx]).join(", "));
        let userStr = q.t === "text" ? (u || "Keine") : (q.t === "single" ? (u !== null ? q.o[u] : "Keine") : u.map(idx => q.o[idx]).join(", "));
        
        let isCorrect = false;
        if(q.t === "text") isCorrect = u.toLowerCase() === q.a.toLowerCase();
        else if(q.t === "single") isCorrect = u === q.c;
        else isCorrect = JSON.stringify(u.sort()) === JSON.stringify(q.c.sort());

        table.innerHTML += `<tr>
            <td>${q.q}</td>
            <td class="${isCorrect ? 'correct' : 'wrong'}">${userStr}</td>
            <td>${correctStr}</td>
        </tr>`;
    });
}

init();
</script>
</body>
</html>
