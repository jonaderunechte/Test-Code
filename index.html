    <script>
        // --- JONA LANGUAGE DEFINITIONS ---
        const JONA_TO_PYTHON = {
            "jona": "print", "Jona": "while", "JONA": "for", "jona_jona": "if",
            "Jona_jona": "elif", "JONA_jona": "else", "jonA": "pass", "JoNA": "break",
            "JOnNA": "continue", "jonaJona": "def", "JonaJona": "class", "jonaJONA": "return",
            "JONA_JONA": "import", "jona_JONA": "from", "JOna": "as", "joNa": "in",
            "JoNa": "is", "JOnA": "not", "jOnA": "and", "jONa": "or", "joNAna": "try",
            "JONAJONA": "except", "jonaJonaJona": "finally", "JONAjona": "raise",
            "JonaJONA": "with", "JONAJona": "global", "jonaJONAjona": "nonlocal",
            "jOna": "del", "JonaJOna": "assert", "jonaJona_jona": "lambda",
            "JonaJona_JONA": "yield", "Jona_Jona": "True", "JONA_jonaJona": "False",
            "jonajonaJona": "None"
        };
        const PYTHON_TO_JONA = Object.fromEntries(Object.entries(JONA_TO_PYTHON).map(([k, v]) => [v, k]));

        // --- PYTHON COMPILER SCRIPT (Injected into Pyodide) ---
        const pythonCompilerCode = `
import re
import sys

JONA_TO_PYTHON = ${JSON.stringify(JONA_TO_PYTHON)}
PYTHON_TO_JONA = ${JSON.stringify(PYTHON_TO_JONA)}

_SORTED_JONA_KEYS = sorted(JONA_TO_PYTHON.keys(), key=len, reverse=True)
_SORTED_PY_KEYS   = sorted(PYTHON_TO_JONA.keys(),  key=len, reverse=True)

def _build_pattern(keywords):
    escaped = [re.escape(k) for k in keywords]
    return re.compile(r'\\b(' + '|'.join(escaped) + r')\\b')

_JONA_PATTERN = _build_pattern(_SORTED_JONA_KEYS)
_PY_PATTERN   = _build_pattern(_SORTED_PY_KEYS)

def _protect_and_replace(source: str, pattern, mapping: dict) -> str:
    STRING_OR_COMMENT = re.compile(
        r'(\"\"\"[\\s\\S]*?\"\"\"|'
        r"'''[\\s\\S]*?'''|"
        r'\"(?:[^\"\\\\]|\\\\.)*\"|'
        r"'(?:[^'\\\\]|\\\\.)*'|"
        r'f\"\"\"[\\s\\S]*?\"\"\"|'
        r"f'''[\\s\\S]*?'''|"
        r'f\"(?:[^\"\\\\]|\\\\.)*\"|'
        r"f'(?:[^'\\\\]|\\\\.)*'|"
        r'#[^\\n]*)'
    )
    result = []
    last = 0
    for m in STRING_OR_COMMENT.finditer(source):
        code_seg = source[last:m.start()]
        translated = pattern.sub(lambda km: mapping[km.group(0)], code_seg)
        result.append(translated)
        result.append(m.group(0))
        last = m.end()
    code_seg = source[last:]
    translated = pattern.sub(lambda km: mapping[km.group(0)], code_seg)
    result.append(translated)
    return "".join(result)

def jona_to_python(source: str) -> str:
    return _protect_and_replace(source, _JONA_PATTERN, JONA_TO_PYTHON)

def python_to_jona(source: str) -> str:
    return _protect_and_replace(source, _PY_PATTERN, PYTHON_TO_JONA)
`;

        // --- STATE & FILE SYSTEM ---
        let files = {
            "main.jona": "JONA_JONA math\n\njonaJona berechne_wurzel(zahl):\n    jona_jona zahl < 0:\n        JONAjona ValueError(\"Keine negativen Zahlen!\")\n    jonaJONA math.sqrt(zahl)\n\njoNAna:\n    ergebnis = berechne_wurzel(16)\n    jona(f\"Die Wurzel aus 16 ist {ergebnis}\")\n    \n    jona_jona Jona_Jona:\n        jona(\"Alles funktioniert! JONA = Python\")\nJONAJONA Exception JOna e:\n    jona(\"Fehler:\", e)\n"
        };
        let activeFile = "main.jona";
        let pyodide = null;
        let editor = null;
        let viewer = null;
        let terminal = null;
        let termFitAddon = null;
        
        // --- LOAD FROM URL OR LOCALSTORAGE ---
        const urlHash = window.location.hash.substring(1);
        if (urlHash) {
            try { files = JSON.parse(atob(urlHash)); } catch(e) { console.error("URL Load Error"); }
        } else {
            const saved = localStorage.getItem('jona_files');
            if (saved) files = JSON.parse(saved);
        }
        if (!files[activeFile]) activeFile = Object.keys(files)[0];

        function saveFiles() {
            localStorage.setItem('jona_files', JSON.stringify(files));
        }

        // --- TERMINAL SETUP ---
        function initTerminal() {
            terminal = new Terminal({
                theme: { background: '#000000', foreground: '#00ffcc', cursor: '#39ff14' },
                fontFamily: 'Consolas, "Courier New", monospace',
                fontSize: 14, cursorBlink: true
            });
            termFitAddon = new FitAddon.FitAddon();
            terminal.loadAddon(termFitAddon);
            terminal.open(document.getElementById('terminal'));
            termFitAddon.fit();
            terminal.writeln("\x1b[1;32m=== JONA REPL & TERMINAL ===\x1b[0m");
            terminal.writeln("\x1b[38;5;240m(Schreibe Jona-Code und drücke Enter)\x1b[0m");
            promptTerm();

            let currentLine = "";
            terminal.onData(e => {
                if (e === '\r') {
                    terminal.write('\r\n');
                    handleReplLine(currentLine);
                    currentLine = "";
                } else if (e === '\u007F') { // Backspace
                    if (currentLine.length > 0) {
                        currentLine = currentLine.slice(0, -1);
                        terminal.write('\b \b');
                    }
                } else {
                    currentLine += e;
                    terminal.write(e);
                }
            });
        }

        function promptTerm() { terminal.write('\r\n\x1b[1;36mJona>\x1b[0m '); }

        async function handleReplLine(line) {
            if(!line.trim()) return promptTerm();
            if(!pyodide) { terminal.writeln("\x1b[31mSystem noch nicht bereit.\x1b[0m"); return promptTerm(); }
            
            try {
                // Translate
                pyodide.globals.set("repl_input", line);
                let pyCode = pyodide.runPython("jona_to_python(repl_input)");
                // Execute
                let result = await pyodide.runPythonAsync(`
try:
    _repl_res = eval(${JSON.stringify(pyCode)})
    if _repl_res is not None: print(repr(_repl_res))
except SyntaxError:
    exec(${JSON.stringify(pyCode)})
`);
            } catch (err) {
                // StdErr handler will print the error in red automatically
            }
            promptTerm();
        }

        // --- PYODIDE INITIALIZATION ---
        async function initPyodide() {
            pyodide = await loadPyodide({
                stdout: (text) => terminal.writeln(text),
                stderr: (text) => terminal.writeln('\x1b[31m' + text + '\x1b[0m') // Error Highlighting
            });
            await pyodide.runPythonAsync(pythonCompilerCode);
            document.getElementById('loader').style.display = 'none';
            document.getElementById('btn-run').disabled = false;
        }

        // --- MONACO EDITOR SETUP ---
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            
            // Register Jona Language
            monaco.languages.register({ id: 'jona' });
            
            // Syntax Highlighting Tokens
            monaco.languages.setMonarchTokensProvider('jona', {
                tokenizer: {
                    root: [
                        [/\b(jona_jona|Jona_jona|JONA_jona|Jona|JONA|jonA|JoNA|JOnNA|joNAna|JONAJONA|jonaJonaJona|JONAjona|JonaJONA)\b/, 'keyword.control'],
                        [/\b(jonaJona|JonaJona|jonaJONA|jonaJona_jona|JonaJona_JONA)\b/, 'keyword.function'],
                        [/\b(joNa|JoNa|JOnA|jOnA|jONa)\b/, 'keyword.operator'],
                        [/\b(Jona_Jona|JONA_jonaJona|jonajonaJona)\b/, 'constant.language'],
                        [/\b(JONA_JONA|jona_JONA|JOna|JONAJona|jonaJONAjona|jOna|JonaJOna)\b/, 'keyword.other'],
                        [/\b(jona)\b/, 'support.function'],
                        [/".*?"/, 'string'],
                        [/'.*?'/, 'string'],
                        [/#.*/, 'comment'],
                        [/\d+/, 'number'],
                    ]
                }
            });

            // Cyberpunk Theme
            monaco.editor.defineTheme('jonaTheme', {
                base: 'vs-dark',
                inherit: true,
                rules: [
                    { token: 'keyword.control', foreground: '00ffcc', fontStyle: 'bold' },
                    { token: 'keyword.function', foreground: '39ff14', fontStyle: 'bold' },
                    { token: 'keyword.operator', foreground: 'ff00ff' },
                    { token: 'constant.language', foreground: 'ffff00' },
                    { token: 'keyword.other', foreground: 'ff9900' },
                    { token: 'support.function', foreground: '39ff14' },
                    { token: 'comment', foreground: '666666', fontStyle: 'italic' },
                    { token: 'string', foreground: 'ffaaaa' }
                ],
                colors: { 'editor.background': '#070f14', 'editorLineNumber.foreground': '#2b5a52' }
            });

            // Autocompletion
            monaco.languages.registerCompletionItemProvider('jona', {
                provideCompletionItems: function(model, position) {
                    const suggestions = Object.entries(JONA_TO_PYTHON).map(([jona, py]) => {
                        return {
                            label: jona,
                            kind: monaco.languages.CompletionItemKind.Keyword,
                            insertText: jona,
                            detail: `Python: ${py}`,
                            documentation: `Jona Keyword für '${py}'`
                        };
                    });
                    return { suggestions: suggestions };
                }
            });

            editor = monaco.editor.create(document.getElementById('editor-container'), {
                value: files[activeFile],
                language: 'jona',
                theme: 'jonaTheme',
                automaticLayout: true,
                fontSize: 15,
                minimap: { enabled: false },
                fontFamily: "'Fira Code', Consolas, monospace"
            });

            viewer = monaco.editor.create(document.getElementById('viewer-container'), {
                value: "",
                language: 'python',
                theme: 'vs-dark',
                automaticLayout: true,
                readOnly: true,
                fontSize: 14,
                minimap: { enabled: false }
            });

            editor.onDidChangeModelContent(() => {
                files[activeFile] = editor.getValue();
                saveFiles();
                updateLiveTranslation();
            });

            updateFileList();
            updateLiveTranslation();
        });

        // --- LOGIC & UI ACTIONS ---

        function updateFileList() {
            const list = document.getElementById('file-list');
            list.innerHTML = '';
            for(let filename in files) {
                const div = document.createElement('div');
                div.className = `file-item px-4 py-2 text-sm flex justify-between group ${filename === activeFile ? 'active' : 'text-gray-400'}`;
                
                const nameSpan = document.createElement('span');
                nameSpan.innerText = filename;
                
                const delBtn = document.createElement('button');
                delBtn.innerHTML = '×';
                delBtn.className = 'hidden group-hover:block text-red-500 hover:text-red-400 text-lg leading-none';
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    if(Object.keys(files).length === 1) return alert("Die letzte Datei kann nicht gelöscht werden.");
                    if(confirm(`Datei ${filename} löschen?`)) {
                        delete files[filename];
                        if(activeFile === filename) activeFile = Object.keys(files)[0];
                        switchFile(activeFile);
                        updateFileList();
                        saveFiles();
                    }
                };

                div.onclick = () => switchFile(filename);
                div.appendChild(nameSpan);
                div.appendChild(delBtn);
                list.appendChild(div);
            }
        }

        function switchFile(filename) {
            activeFile = filename;
            if(editor) {
                editor.setValue(files[filename] || "");
                const isPy = filename.endsWith('.py');
                monaco.editor.setModelLanguage(editor.getModel(), isPy ? 'python' : 'jona');
                document.getElementById('primary-editor-label').innerText = filename;
            }
            updateFileList();
            updateLiveTranslation();
        }

        document.getElementById('btn-new-file').onclick = () => {
            let name = prompt("Dateiname (z.B. modul.jona oder script.py):");
            if(name && !files[name]) {
                if(!name.includes('.')) name += '.jona';
                files[name] = "";
                switchFile(name);
                saveFiles();
            }
        };

        // Live Translation Logic
        let transTimeout;
        function updateLiveTranslation() {
            if(!pyodide || document.getElementById('split-pane').classList.contains('hidden')) return;
            clearTimeout(transTimeout);
            transTimeout = setTimeout(() => {
                try {
                    const code = editor.getValue();
                    if(activeFile.endsWith('.jona')) {
                        pyodide.globals.set("src", code);
                        viewer.setValue(pyodide.runPython("jona_to_python(src)"));
                        monaco.editor.setModelLanguage(viewer.getModel(), 'python');
                    } else {
                        pyodide.globals.set("src", code);
                        viewer.setValue(pyodide.runPython("python_to_jona(src)"));
                        monaco.editor.setModelLanguage(viewer.getModel(), 'jona');
                    }
                } catch(e) { /* ignore parse errors while typing */ }
            }, 300);
        }

        document.getElementById('btn-split').onclick = () => {
            const pane = document.getElementById('split-pane');
            pane.classList.toggle('hidden');
            if(!pane.classList.contains('hidden')) updateLiveTranslation();
        };

        // Execution Logic
        document.getElementById('btn-run').onclick = async () => {
            if(!pyodide) return;
            terminal.writeln(`\x1b[1;34m> Führe ${activeFile} aus...\x1b[0m`);
            
            // 1. Compile all .jona files and mount them into Pyodide FS so imports work!
            for(let filename in files) {
                let pyCode = files[filename];
                if(filename.endsWith('.jona')) {
                    pyodide.globals.set("src", files[filename]);
                    try {
                        pyCode = pyodide.runPython("jona_to_python(src)");
                    } catch(e) {
                        terminal.writeln(`\x1b[31mKompilierungsfehler in ${filename}\x1b[0m`);
                        continue;
                    }
                }
                const pyFilename = filename.replace(/\.jona$/, '.py');
                pyodide.FS.writeFile(pyFilename, pyCode);
            }

            // 2. Execute active file
            let codeToRun = files[activeFile];
            if(activeFile.endsWith('.jona')) {
                pyodide.globals.set("src", codeToRun);
                codeToRun = pyodide.runPython("jona_to_python(src)");
            }
            
            try {
                await pyodide.runPythonAsync(codeToRun);
            } catch(e) {
                // Handled by stderr redirect
            }
            promptTerm();
        };

        // File Convert Buttons
        document.getElementById('btn-jona-to-py').onclick = () => {
            if(!pyodide) return;
            pyodide.globals.set("src", editor.getValue());
            editor.setValue(pyodide.runPython("jona_to_python(src)"));
            if(activeFile.endsWith('.jona')) {
                const newName = activeFile.replace('.jona', '.py');
                files[newName] = files[activeFile];
                delete files[activeFile];
                switchFile(newName);
            }
        };

        document.getElementById('btn-py-to-jona').onclick = () => {
            if(!pyodide) return;
            pyodide.globals.set("src", editor.getValue());
            editor.setValue(pyodide.runPython("python_to_jona(src)"));
            if(activeFile.endsWith('.py')) {
                const newName = activeFile.replace('.py', '.jona');
                files[newName] = files[activeFile];
                delete files[activeFile];
                switchFile(newName);
            }
        };

        document.getElementById('btn-download').onclick = () => {

            a.download = activeFile;
