<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScribbleCode V2 - Mit Image-Scanner</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #1a1a1d;
            color: #efefef;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #25252b;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 600px;
        }
        .controls { margin-bottom: 20px; }
        input[type="text"] {
            width: 70%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            margin-bottom: 10px;
        }
        .btn-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        button, label {
            background-color: #3a7794;
            color: white;
            border: none;
            padding: 10px 18px;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover, label:hover { background-color: #4a87a4; }
        .btn-download { background-color: #2e7d32; }
        .btn-download:hover { background-color: #388e3c; }
        
        canvas {
            margin-top: 20px;
            max-width: 100%;
            border-radius: 8px;
            background-color: #fdfaf0;
            display: block;
        }
        #fileInput { display: none; }
        .output {
            margin-top: 20px;
            padding: 15px;
            background: #111;
            border-left: 4px solid #3a7794;
            font-family: monospace;
            word-wrap: break-word;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>ScribbleCode V2</h2>
        <p>Generiere Codes oder lade ein Bild hoch zum Scannen.</p>
        
        <div class="controls">
            <input type="text" id="inputText" placeholder="Text eingeben..." value="GEHEIM123">
            <div class="btn-group">
                <button onclick="generateCode()">Generieren</button>
                <button class="btn-download" onclick="downloadImage()">Bild speichern (.png)</button>
                <label for="fileInput">Bild hochladen & auslesen</label>
                <input type="file" id="fileInput" accept="image/*" onchange="handleUpload(event)">
            </div>
        </div>

        <canvas id="codeCanvas" width="500" height="500"></canvas>

        <div id="status" style="margin-top:10px; font-weight:bold;"></div>
        <div id="outputText" class="output">Ergebnis-Daten...</div>
    </div>

    <script>
        const canvas = document.getElementById('codeCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const BLUE_COLOR = { r: 58, g: 119, b: 148 }; // Unser #3a7794

        function drawBackground(ctx, w, h) {
            ctx.fillStyle = "#fdfaf0";
            ctx.fillRect(0, 0, w, h);
            // Gitter zeichnen
            ctx.strokeStyle = "#d6d8dd";
            ctx.lineWidth = 2;
            for(let i=1; i<5; i++) {
                ctx.beginPath(); ctx.moveTo(w*i/5, 0); ctx.lineTo(w*i/5, h); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, h*i/5); ctx.lineTo(w, h*i/5); ctx.stroke();
            }
        }

        function generateCode() {
            const text = document.getElementById('inputText').value;
            if (!text) return;
            const w = canvas.width;
            const h = canvas.height;
            drawBackground(ctx, w, h);

            const bytes = new TextEncoder().encode(text);
            let nibbles = [];
            for (let b of bytes) { nibbles.push(b >> 4); nibbles.push(b & 0x0F); }

            const pad = w * 0.15;
            const stepX = (w - 2 * pad) / (nibbles.length - 1);

            ctx.beginPath();
            ctx.strokeStyle = `rgb(${BLUE_COLOR.r},${BLUE_COLOR.g},${BLUE_COLOR.b})`;
            ctx.lineWidth = 8;
            ctx.lineJoin = "round";
            ctx.lineCap = "round";

            for (let i = 0; i < nibbles.length; i++) {
                const x = pad + i * stepX;
                const valNorm = nibbles[i] / 15;
                const y = (i % 2 === 0) 
                    ? pad + valNorm * (h * 0.3) 
                    : h - pad - valNorm * (h * 0.3);
                
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();
            document.getElementById('status').innerText = "Code generiert.";
        }

        function downloadImage() {
            const link = document.createElement('a');
            link.download = 'scribble-code.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        function handleUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    scanImage();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function scanImage() {
            document.getElementById('status').innerText = "Scanne Pixel...";
            const w = canvas.width;
            const h = canvas.height;
            const imgData = ctx.getImageData(0, 0, w, h).data;
            
            // 1. Finde alle blauen Pixel und ihre X/Y Koordinaten
            let points = [];
            for (let x = 0; x < w; x++) {
                let columnBlueY = [];
                for (let y = 0; y < h; y++) {
                    const idx = (y * w + x) * 4;
                    const r = imgData[idx], g = imgData[idx+1], b = imgData[idx+2];
                    
                    // Farberkennung mit Toleranz
                    if (Math.abs(r-BLUE_COLOR.r) < 40 && Math.abs(g-BLUE_COLOR.r) < 40 && b > 100) {
                        columnBlueY.push(y);
                    }
                }
                if (columnBlueY.length > 0) {
                    // Durchschnittliches Y in dieser Spalte (Mitte der Linie)
                    const avgY = columnBlueY.reduce((a,b) => a+b) / columnBlueY.length;
                    points.push({x, y: avgY});
                }
            }

            if (points.length < 10) {
                document.getElementById('outputText').innerText = "Fehler: Kein Scribble-Code erkannt.";
                return;
            }

            // 2. Spitzen finden (Lokale Minima und Maxima)
            let peaks = [];
            for (let i = 1; i < points.length - 1; i++) {
                const prev = points[i-1].y;
                const curr = points[i].y;
                const next = points[i+1].y;
                
                // Wenn die Steigung die Richtung ändert, haben wir eine Spitze
                if ((curr < prev && curr < next) || (curr > prev && curr > next)) {
                    // Verhindere zu viele eng beieinander liegende Punkte
                    if (peaks.length === 0 || Math.abs(points[i].x - peaks[peaks.length-1].x) > 5) {
                        peaks.push(points[i]);
                    }
                }
            }
            // Ersten und letzten Punkt hinzufügen
            peaks.unshift(points[0]);
            peaks.push(points[points.length-1]);

            // 3. Werte rekonstruieren
            const pad = h * 0.15;
            const maxRange = h * 0.3;
            let nibbles = [];

            peaks.forEach((p, index) => {
                let val;
                if (index % 2 === 0) { // Oben
                    val = (p.y - pad) / maxRange * 15;
                } else { // Unten
                    val = (h - pad - p.y) / maxRange * 15;
                }
                nibbles.push(Math.max(0, Math.min(15, Math.round(val))));
            });

            // Nibbles zu Bytes
            let bytes = [];
            for (let i = 0; i < nibbles.length; i += 2) {
                if (nibbles[i+1] !== undefined) {
                    bytes.push((nibbles[i] << 4) | nibbles[i+1]);
                }
            }

            try {
                const decodedText = new TextDecoder().decode(new Uint8Array(bytes));
                document.getElementById('outputText').innerText = "DECODER ERGEBNIS: " + decodedText;
                document.getElementById('status').innerText = "Erfolgreich ausgelesen!";
            } catch(e) {
                document.getElementById('outputText').innerText = "Fehler beim Dekodieren der Daten.";
            }
        }
        
        window.onload = generateCode;
    </script>
</body>
</html>
