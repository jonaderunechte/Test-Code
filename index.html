<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geschichts-Coach: Moderne & Diktaturen</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; line-height: 1.6; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; border-bottom: 2px solid #f1c40f; padding-bottom: 10px; }
        .stats { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; color: #7f8c8d; }
        .question { font-size: 1.2rem; margin-bottom: 20px; color: #2c3e50; }
        .options { display: grid; gap: 10px; }
        button { padding: 12px; border: 2px solid #3498db; background: white; border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 1rem; text-align: left; }
        button:hover { background: #3498db; color: white; }
        .result-screen { text-align: center; display: none; }
        .score-display { font-size: 3rem; font-weight: bold; color: #27ae60; margin: 20px 0; }
        .np-display { font-size: 1.5rem; color: #e67e22; margin-bottom: 20px; }
        .feedback { font-style: italic; margin-bottom: 30px; }
        .restart-btn { background: #f1c40f; color: #2c3e50; border: none; padding: 15px 30px; font-weight: bold; text-align: center; display: inline-block; cursor: pointer; border-radius: 8px; }
        .restart-btn:hover { background: #d4ac0d; }
    </style>
</head>
<body>

<div class="container">
    <div id="quiz-ui">
        <h1>Prüfungs-Check: 19./20. Jahrhundert</h1>
        <div class="stats">
            <span>Frage: <span id="current-q">1</span>/10</span>
            <span>Runde: <span id="round-count">1</span></span>
        </div>
        <div id="question-text" class="question">Lade Frage...</div>
        <div id="options-container" class="options"></div>
    </div>

    <div id="result-ui" class="result-screen">
        <h1>Dein Ergebnis</h1>
        <div class="score-display" id="final-score">0/10</div>
        <div class="np-display" id="final-np">0 Notenpunkte</div>
        <div id="final-feedback" class="feedback"></div>
        <button class="restart-btn" onclick="startNewRound()">Nächste Übungsrunde (10 neue Fragen)</button>
    </div>
</div>

<script>
    const questionPool = [
        // WEGE IN DIE MODERNE
        { q: "Was bedeutet 'Revolution von oben' (1871)?", a: ["Einigung durch Fürsten/Militär (Bismarck)", "Aufstand der Arbeiter", "Friedliche Wahl", "Demokratisierung Preußens"], c: 0 },
        { q: "Was war ein Merkmal der 'Jacksonian Democracy'?", a: ["Stimmrecht für alle weißen Männer", "Abschaffung der Sklaverei", "Königreich USA", "Nur reiche Eliten wählen"], c: 0 },
        { q: "Was beschreibt das 'Gilded Age'?", a: ["Wirtschaftsboom mit versteckten sozialen Mängeln", "Eine Ära des reinen Goldes", "Rückkehr zur Landwirtschaft", "Ende des Kapitalismus"], c: 0 },
        { q: "Was ist ein 'Modernisierungsverlierer' um 1900?", a: ["Handwerker, die gegen Industrie verloren", "Internet-Nutzer", "Reiche Konzernerben", "Politiker der Mitte"], c: 0 },
        { q: "Was bedeutet 'Urbanisierung'?", a: ["Massives Städtewachstum", "Flucht aufs Dorf", "Bau von Schlössern", "Abriss von Fabriken"], c: 0 },
        { q: "Was war die 'Nationalversammlung' (1848)?", a: ["Erstes gewähltes dt. Parlament", "Hitlers Regierung", "Stammtisch der Fürsten", "Bismarcks Kabinett"], c: 0 },
        { q: "Wer prägte 'Eisen und Blut'?", a: ["Otto von Bismarck", "Karl Marx", "Andrew Jackson", "Adolf Hitler"], c: 0 },
        { q: "Was ist 'Laissez-faire'?", a: ["Staat greift nicht in Wirtschaft ein", "Starke staatliche Kontrolle", "Verbot von Handel", "Schutz von Arbeiterrechten"], c: 0 },
        { q: "Was förderte den 'Massenkonsum'?", a: ["Günstige Preise durch Fließbandarbeit", "Exklusivität für den Adel", "Tauschhandel", "Verbot von Werbung"], c: 0 },
        { q: "Welche Ideologie entstand als 'Krisenreaktion' auf die Moderne?", a: ["Radikalnationalismus", "Liberalismus", "Globalismus", "Pazifismus"], c: 0 },

        // LIBERALISMUS / KOMMUNISMUS
        { q: "Was ist ein Kernmerkmal des Liberalismus?", a: ["Gewaltenteilung & Grundrechte", "Diktatur einer Partei", "Planwirtschaft", "Gleichschaltung"], c: 0 },
        { q: "Was lehnt der 'Antipluralismus' ab?", a: ["Meinungsvielfalt", "Einheitsmeinung", "Die Regierung", "Eugenik"], c: 0 },
        { q: "Was bedeutet 'Diktatur des Proletariats'?", a: ["Herrschaft der Arbeiterklasse", "Herrschaft des Kaisers", "Herrschaft des Marktes", "Anarchie"], c: 0 },
        { q: "Was ist eine 'Kaderpartei'?", a: ["Elitepartei der Revolutionäre", "Volkspartei für alle", "Religiöser Orden", "Verbotene Partei"], c: 0 },
        { q: "Was fordert die 'Partizipation'?", a: ["Teilhabe der Bürger an Macht", "Ausschluss der Armen", "Abschaffung von Wahlen", "Gehorsam"], c: 0 },
        { q: "Was ist 'Pluralismus'?", a: ["Existenz vieler Interessen & Gruppen", "Eine einzige Wahrheit", "Herrschaft weniger Reicher", "Chaos"], c: 0 },

        // WEIMARER REPUBLIK
        { q: "Wann war die 'Novemberrevolution'?", a: ["1918", "1933", "1848", "1945"], c: 0 },
        { q: "Was ermöglichte 'Präsidialkabinette'?", a: ["Art. 48 (Notverordnungen)", "Art. 1 (Menschenwürde)", "Ermächtigungsgesetz", "Grundgesetz"], c: 0 },
        { q: "Welches Ereignis startete 1929?", a: ["Weltwirtschaftskrise", "Machtergreifung", "Börsenboom", "Friedensschluss"], c: 0 },
        { q: "Was bedeutet 'Revision' nach 1918?", a: ["Widerstand gegen Versailler Vertrag", "Akzeptanz der Niederlage", "Demokratisierung", "Neuordnung der Wirtschaft"], c: 0 },
        { q: "Wer war 'Ersatzkaiser' in Weimar?", a: ["Der Reichspräsident", "Der Reichskanzler", "Der Papst", "Hitler"], c: 0 },
        { q: "Warum scheiterte Weimar parlamentarisch?", a: ["Handlungsunfähigkeit durch Radikalisierung", "Zu viele neue Gesetze", "Zu wenig Parteien", "Kaiser kam zurück"], c: 0 },

        // NATIONALSOZIALISMUS
        { q: "Was bedeutet 'Volksgemeinschaft'?", a: ["Ausgrenzung von 'Nicht-Ariern'", "Soziale Hilfe für alle", "Demokratischer Verbund", "Religiöse Gemeinschaft"], c: 0 },
        { q: "Was war das Ziel von 'Lebensraum im Osten'?", a: ["Vernichtungskrieg & Expansion", "Urlaub am Meer", "Handelsbeziehungen", "Friedliche Besiedlung"], c: 0 },
        { q: "Wann war die 'Machtergreifung'?", a: ["30.01.1933", "09.11.1918", "01.09.1939", "20.07.1944"], c: 0 },
        { q: "Was bedeutet 'Gleichschaltung'?", a: ["Anpassung aller Vereine an NS-Linie", "Bau von Stromleitungen", "Gleiche Löhne für alle", "Wahlfreiheit"], c: 0 },
        { q: "Wer war Kern der NS-Rassenideologie?", a: ["Antisemitismus", "Liberalismus", "Katholizismus", "Pazifismus"], c: 0 },
        { q: "Was war die 'Pseudolegalität'?", a: ["NS-Machtübernahme mit legalem Schein", "Illegaler Putsch", "Demokratische Wahl", "Kaiserliche Ernennung"], c: 0 },
        { q: "Was ist das 'Führerprinzip'?", a: ["Autorität von oben nach unten", "Wahl des Chefs durch Arbeiter", "Gewaltenteilung", "Basisdemokratie"], c: 0 },
        { q: "Welche Rolle spielten Konzentrationslager?", a: ["Terror & Ausschaltung von Gegnern", "Arbeitsbeschaffungsmaßnahme", "Internate für Eliten", "Flüchtlingsheime"], c: 0 },
        { q: "Was war 'Euthanasie' im NS?", a: ["Systematischer Mord an Kranken", "Schmerzlinderung", "Tierversuche", "Krankenhausreform"], c: 0 },
        { q: "Was bedeutet 'Sozialdarwinismus'?", a: ["Übertragung von Biologie auf Völker", "Gleichheit aller Menschen", "Schutz der Schwachen", "Wirtschaftshilfe"], c: 0 },
        { q: "Wer wurde durch die 'Nürnberger Gesetze' rechtlos?", a: ["Juden", "Adelige", "NSDAP-Mitglieder", "Soldaten"], c: 0 },
        { q: "Was geschah im 'Ghetto'?", a: ["Zwangsabsonderung jüdischer Bürger", "Künstlerviertel", "Modernes Wohnprojekt", "Regierungsviertel"], c: 0 },
        { q: "Was war die 'NSDAP'?", a: ["Nationalsozialistische Arbeiterpartei", "Kommunistische Partei", "Liberale Zentrumspartei", "Verein für Sport"], c: 0 },
        { q: "Was kennzeichnet 'Massenloyalität'?", a: ["Unterstützung des Regimes durch Propaganda", "Widerstand des Volkes", "Gleichgültigkeit", "Geheimer Hass"], c: 0 },
        { q: "Was ist 'Widerstand' im NS?", a: ["Aktiver Kampf gegen das Regime", "Zustimmung zu Gesetzen", "Ausreise", "Schweigen"], c: 0 },
        { q: "Was passierte am 9. November 1938?", a: ["Reichspogromnacht", "Ende des Weltkriegs", "Hitlers Geburtstag", "Olympische Spiele"], c: 0 },
        { q: "Was war die 'HJ' (Hitlerjugend)?", a: ["NS-Organisation zur Erziehung der Jugend", "Pfadfinderbund", "Schule für Technik", "Sportverein"], c: 0 },
        { q: "Was bedeutet 'Deportation'?", a: ["Zwangstransport in Vernichtungslager", "Freiwillige Auswanderung", "Einreiseerlaubnis", "Urlaub"], c: 0 },
        { q: "Was ist 'Antiliberalismus'?", a: ["Ablehnung von Freiheit & Demokratie", "Liebe zum Parlament", "Freihandel", "Toleranz"], c: 0 },
        { q: "Wer ernannte Hitler zum Kanzler?", a: ["Hindenburg", "Bismarck", "Ebert", "Das Volk per Direktwahl"], c: 0 },
        { q: "Was war das 'Ermächtigungsgesetz'?", a: ["Selbstentmachtung des Parlaments", "Einführung der Grundrechte", "Kriegserklärung", "Frauenwahlrecht"], c: 0 },
        { q: "Wofür stand die Propaganda unter Goebbels?", a: ["Manipulation der öffentlichen Meinung", "Wahrheitsgetreue Berichterstattung", "Wissenschaftliche Forschung", "Unterhaltung ohne Politik"], c: 0 },
        { q: "Was beschreibt der 'Totalitarismus'?", a: ["Kontrolle über alle Lebensbereiche", "Begrenzte Macht des Staates", "Freiheit des Einzelnen", "Direkte Demokratie"], c: 0 },
        { q: "Was ist die 'SD'?", a: ["Sicherheitsdienst der SS", "Soziale Dienste", "Schülerdelegation", "Staatliche Druckerei"], c: 0 },
        { q: "Was war die 'SA'?", a: ["Paramilitärische Kampforganisation", "Soziale Abteilung", "Sängerakademie", "Schutzarmee"], c: 0 },
        { q: "Welcher Begriff steht für die Vernichtung der Juden?", a: ["Shoah / Holocaust", "Reformation", "Industrialisierung", "Völkerwanderung"], c: 0 },
        { q: "Was war 'Big Business' in den USA?", a: ["Aufstieg mächtiger Monopole", "Kleine Familienbetriebe", "Verbot von Handel", "Staatliche Firmen"], c: 0 },
        { q: "Was bedeutet 'Modernisierungsbeschleunigung'?", a: ["Schneller Wandel durch Technik", "Verlangsamung der Arbeit", "Rückkehr zum Mittelalter", "Bauernreform"], c: 0 }
    ];

    let currentQuestions = [];
    let score = 0;
    let questionIndex = 0;
    let round = 1;

    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    function startNewRound() {
        currentQuestions = shuffle([...questionPool]).slice(0, 10);
        score = 0;
        questionIndex = 0;
        document.getElementById('quiz-ui').style.display = 'block';
        document.getElementById('result-ui').style.display = 'none';
        document.getElementById('round-count').innerText = round;
        showQuestion();
    }

    function showQuestion() {
        const q = currentQuestions[questionIndex];
        document.getElementById('current-q').innerText = questionIndex + 1;
        document.getElementById('question-text').innerText = q.q;
        const optionsDiv = document.getElementById('options-container');
        optionsDiv.innerHTML = '';
        
        q.a.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.onclick = () => handleAnswer(i);
            optionsDiv.appendChild(btn);
        });
    }

    function handleAnswer(i) {
        if (i === currentQuestions[questionIndex].c) score++;
        questionIndex++;
        if (questionIndex < 10) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function calculateNP(s) {
        // Skala für 10 Fragen
        if (s === 10) return 15;
        if (s === 9) return 13;
        if (s === 8) return 11;
        if (s === 7) return 09;
        if (s === 6) return 07;
        if (s === 5) return 05;
        if (s === 4) return 03;
        return 0;
    }

    function getFeedback(np) {
        if (np >= 13) return "Exzellent! Du bist perfekt vorbereitet. Du beherrschst die Begriffe und Zusammenhänge.";
        if (np >= 10) return "Sehr gut! Du hast eine stabile Basis. Schau dir die Begriffe zu Weimar/NS nochmal kurz an.";
        if (np >= 7) return "Befriedigend. Du weißt viel, aber bei den Details (z.B. Präsidialkabinette) hapert es noch.";
        if (np >= 5) return "Ausreichend. Du solltest die Zusammenfassungen oben nochmal intensiv lesen.";
        return "Gefahr! Du musst dich heute Abend nochmal richtig dransetzen. Lerne die Begriffsliste!";
    }

    function showResult() {
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('result-ui').style.display = 'block';
        const np = calculateNP(score);
        document.getElementById('final-score').innerText = score + "/10";
        document.getElementById('final-np').innerText = np + " Notenpunkte (NP)";
        document.getElementById('final-feedback').innerText = getFeedback(np);
        round++;
    }

    startNewRound();
</script>

</body>
</html>
