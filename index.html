<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScribbleCode Generator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }
        .container {
            background: #2b2b36;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
        }
        input {
            width: 80%;
            padding: 10px;
            margin-bottom: 20px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
        }
        button {
            background-color: #3a7794;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #2a5a72;
        }
        canvas {
            margin-top: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            background-color: #fdfaf0; /* Hintergrundfarbe aus deinem Bild */
        }
        .output {
            margin-top: 20px;
            padding: 15px;
            background: #1e1e24;
            border-radius: 6px;
            min-height: 24px;
            font-family: monospace;
            color: #4CAF50;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>ScribbleCode System</h2>
        <p>Gib einen Text ein (ideal: 5-30 Zeichen), um ihn in eine Vektor-Linie zu übersetzen.</p>
        
        <input type="text" id="inputText" placeholder="Geheime Nachricht hier..." value="Hello World">
        <br>
        <button onclick="generateCode()">Generieren</button>
        <button onclick="decodeCode()">Auslesen</button>

        <canvas id="codeCanvas" width="400" height="400"></canvas>

        <div id="outputText" class="output">Ausgelesener Text erscheint hier...</div>
    </div>

    <script>
        let encodedDataPoints = []; // Speichert die Vektoren fürs Auslesen

        function drawBackgroundAndMarkers(ctx, w, h) {
            // Hintergrund
            ctx.fillStyle = "#fdfaf0";
            ctx.fillRect(0, 0, w, h);

            // Rasterlinien (Gitter)
            ctx.strokeStyle = "#d6d8dd";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(w * 0.2, 0); ctx.lineTo(w * 0.2, h);
            ctx.moveTo(w * 0.8, 0); ctx.lineTo(w * 0.8, h);
            ctx.moveTo(0, h * 0.2); ctx.lineTo(w, h * 0.2);
            ctx.moveTo(0, h * 0.8); ctx.lineTo(w, h * 0.8);
            ctx.stroke();

            // Eck-Markierungen (Wie im Bild)
            ctx.strokeStyle = "#3a7794";
            ctx.lineWidth = 8;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
            
            // Oben Rechts
            ctx.beginPath(); ctx.moveTo(w * 0.9, h * 0.2); ctx.lineTo(w * 0.9, h * 0.1); ctx.lineTo(w * 0.8, h * 0.1); ctx.stroke();
            // Unten Links
            ctx.beginPath(); ctx.moveTo(w * 0.2, h * 0.9); ctx.lineTo(w * 0.1, h * 0.9); ctx.lineTo(w * 0.1, h * 0.8); ctx.stroke();
            // Unten Rechts
            ctx.beginPath(); ctx.moveTo(w * 0.8, h * 0.9); ctx.lineTo(w * 0.9, h * 0.9); ctx.lineTo(w * 0.9, h * 0.8); ctx.stroke();
        }

        function generateCode() {
            const text = document.getElementById('inputText').value;
            if (!text) return;

            const canvas = document.getElementById('codeCanvas');
            const ctx = canvas.getContext('2d');
            const w = canvas.width;
            const h = canvas.height;

            drawBackgroundAndMarkers(ctx, w, h);

            // Text in Bytes umwandeln
            const encoder = new TextEncoder();
            const bytes = encoder.encode(text);
            
            // Wir zerlegen jedes Byte (8 Bit) in zwei 4-Bit Blöcke (0-15)
            // Das gibt uns die Variablen für Winkel und Länge!
            let nibbles = [];
            for (let byte of bytes) {
                nibbles.push(byte >> 4);     // Obere 4 Bits
                nibbles.push(byte & 0x0F);   // Untere 4 Bits
            }

            const paddingX = w * 0.15;
            const paddingY = h * 0.15;
            const drawW = w - (paddingX * 2);
            const drawH = h - (paddingY * 2);

            // X-Schritte berechnen
            const stepX = drawW / (nibbles.length > 1 ? nibbles.length - 1 : 1);

            ctx.beginPath();
            ctx.strokeStyle = "#3a7794";
            ctx.lineWidth = 6;

            encodedDataPoints = []; // Zurücksetzen für den Decoder

            for (let i = 0; i < nibbles.length; i++) {
                const val = nibbles[i]; // Wert zwischen 0 und 15
                
                const x = paddingX + (i * stepX);
                let y;

                // Damit es "zickzack" aussieht, zwingen wir jeden geraden Punkt
                // in die obere Hälfte und jeden ungeraden in die untere Hälfte.
                // Der genaue Y-Wert innerhalb der Hälfte bestimmt den WINKEL und die LÄNGE.
                if (i % 2 === 0) {
                    y = paddingY + (val / 15) * (drawH * 0.4); 
                } else {
                    y = paddingY + drawH - (val / 15) * (drawH * 0.4);
                }

                // Speichere die mathematischen Daten für den Ausleser
                encodedDataPoints.push({ x, y, val });

                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            
            // Linie zeichnen
            ctx.stroke();
            document.getElementById('outputText').innerText = "Code generiert!";
            document.getElementById('outputText').style.color = "#4CAF50";
        }

        function decodeCode() {
            if (encodedDataPoints.length === 0) {
                document.getElementById('outputText').innerText = "Kein Code zum Auslesen gefunden!";
                document.getElementById('outputText').style.color = "#ff5252";
                return;
            }

            // Aus den Vektordaten die 4-Bit-Blöcke rekonstruieren
            let bytes = [];
            for (let i = 0; i < encodedDataPoints.length; i += 2) {
                const upperNibble = encodedDataPoints[i].val;
                // Falls es eine ungerade Anzahl gibt (sollte nicht passieren), fange Fehler ab
                const lowerNibble = encodedDataPoints[i+1] ? encodedDataPoints[i+1].val : 0; 
                
                const byte = (upperNibble << 4) | lowerNibble;
                bytes.push(byte);
            }

            // Bytes zurück in Text übersetzen
            const decoder = new TextDecoder();
            const decodedText = decoder.decode(new Uint8Array(bytes));

            document.getElementById('outputText').innerText = "Entschlüsselt: " + decodedText;
            document.getElementById('outputText').style.color = "#ffffff";
        }

        // Beim Start einmal ausführen
        window.onload = generateCode;
    </script>
</body>
</html>
