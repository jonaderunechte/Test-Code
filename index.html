<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JT Farm Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #557A46;
            background-image: 
                radial-gradient(#4b6e3d 15%, transparent 16%), 
                radial-gradient(#4b6e3d 15%, transparent 16%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
        }

        .wood-panel {
            background-color: #D4A373;
            background-image: repeating-linear-gradient(to bottom, transparent, transparent 20px, rgba(0,0,0,0.05) 20px, rgba(0,0,0,0.05) 22px);
            border: 6px solid #8B5A2B;
            border-radius: 16px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1), 4px 4px 10px rgba(0,0,0,0.3);
        }

        .dirt-field {
            background-color: #6d4c41;
            background-image: repeating-linear-gradient( 0deg, #6d4c41, #6d4c41 15px, #5d4037 15px, #5d4037 30px );
            border: 6px solid #4e342e;
            border-radius: 12px;
            position: relative;
            box-shadow: inset 2px 2px 12px rgba(0,0,0,0.6);
            transition: transform 0.1s;
        }

        .dirt-field:active { transform: scale(0.98); }

        .svg-icon {
            width: 100%;
            height: 100%;
            filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.3));
        }

        .animal-tooltip {
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.2s;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }
        .group:hover .animal-tooltip {
            visibility: visible;
            opacity: 1;
        }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #e0e0e0; border-radius: 8px; }
        ::-webkit-scrollbar-thumb { background: #8B5A2B; border-radius: 8px; }
        ::-webkit-scrollbar-thumb:hover { background: #5d4037; }

        .tab-active { background-color: #8B5A2B; color: white; }
        .tab-inactive { background-color: #e5e7eb; color: #4b5563; }
        .tab-inactive:hover { background-color: #d1d5db; }

        #loading-screen {
            position: fixed; inset: 0; background: #557A46; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center; color: white;
        }
        
        .achievement-card { transition: all 0.3s ease; }
        .achievement-unlocked { border-color: #F59E0B; background: linear-gradient(135deg, #FFFDE7 0%, #FFF8E1 100%); }
        .achievement-locked { filter: grayscale(100%); opacity: 0.6; }
    </style>
</head>
<body class="min-h-screen text-gray-800 selection:bg-green-300">

    <div id="loading-screen">
        <h1 class="text-5xl font-black mb-4">JT Farm lädt...</h1>
        <p class="text-xl">Cloud-Speicherstand wird synchronisiert...</p>
    </div>

    <!-- Top Navigation / Stats -->
    <div class="fixed top-0 w-full bg-[#fefae0] shadow-md z-50 p-3 flex justify-between items-center border-b-8 border-[#8B5A2B]">
        <div class="flex space-x-4 items-center flex-wrap">
            <div class="flex items-center gap-2 bg-white px-3 py-1 rounded-lg border-2 border-gray-300 shadow-sm cursor-pointer hover:bg-gray-50" onclick="renameFarm()">
                <h1 id="ui-farmname" class="text-2xl font-black text-[#557A46]">JT Farm</h1>
            </div>
            
            <div class="text-xl font-bold bg-yellow-100 text-yellow-800 px-4 py-2 rounded-xl border-4 border-yellow-400 shadow-sm flex items-center gap-2">
                <span class="font-black">Geld:</span> <span id="ui-money">0</span> €
            </div>
            <div class="text-lg font-bold bg-blue-100 text-blue-800 px-4 py-2 rounded-xl border-4 border-blue-400 shadow-sm">
                Tag <span id="ui-day">1</span> - <span id="ui-time">00:00 Uhr</span>
            </div>
            <div class="text-lg font-bold bg-orange-100 text-orange-800 px-4 py-2 rounded-xl border-4 border-orange-400 shadow-sm" title="Freie Arbeiter / Gesamte Arbeiter">
                Arbeiter: <span id="ui-workers">0/0</span>
            </div>
            <div id="ui-power-warning" class="hidden text-lg font-bold bg-red-100 text-red-800 px-4 py-2 rounded-xl border-4 border-red-500 shadow-sm animate-pulse">
                ⚡ STROMAUSFALL
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button id="btn-speed" class="hidden bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-xl border-b-4 border-red-700 shadow font-black transition active:translate-y-1 active:border-b-0">Admin Zeitraffer</button>
        </div>
    </div>

    <!-- Main Container -->
    <div class="pt-24 pb-6 px-4 max-w-7xl mx-auto flex gap-6 h-screen">
        
        <!-- Sidebar Navigation -->
        <div class="w-64 wood-panel flex flex-col overflow-hidden h-[calc(100vh-7rem)] bg-[#FAEDCD] flex-shrink-0">
            <div class="bg-[#8B5A2B] text-white text-center py-4 font-black text-2xl uppercase tracking-widest border-b-4 border-[#5d4037]">Menü</div>
            <button class="nav-btn tab-active p-4 text-left font-bold text-lg border-b-2 border-[#D4A373] transition flex items-center" data-tab="farm">
                <svg class="w-6 h-6 mr-3 text-gray-700" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3L4 9v12h16V9l-8-6zm6 16h-3v-6H9v6H6v-9l6-4.5 6 4.5v9z"/></svg> Meine Farm
            </button>
            <button class="nav-btn tab-inactive p-4 text-left font-bold text-lg border-b-2 border-[#D4A373] transition flex items-center" data-tab="inventory">
                <svg class="w-6 h-6 mr-3 text-gray-700" fill="currentColor" viewBox="0 0 24 24"><path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z"/></svg> Inventar
            </button>
            <button class="nav-btn tab-inactive p-4 text-left font-bold text-lg border-b-2 border-[#D4A373] transition flex items-center" data-tab="shop">
                <svg class="w-6 h-6 mr-3 text-gray-700" fill="currentColor" viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg> Shop
            </button>
            <button class="nav-btn tab-inactive p-4 text-left font-bold text-lg border-b-2 border-[#D4A373] transition flex items-center" data-tab="machines">
                <svg class="w-6 h-6 mr-3 text-gray-700" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12h7v7h-7zm1 2h5v3h-5zM4 6h16v2H4zm0 5h6v8H4z"/></svg> Fabriken
            </button>
            <button class="nav-btn tab-inactive p-4 text-left font-bold text-lg border-b-2 border-[#D4A373] transition flex items-center" data-tab="achievements">
                <svg class="w-6 h-6 mr-3 text-yellow-600" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg> Erfolge
            </button>
            <button class="nav-btn tab-inactive p-4 text-left font-bold text-lg border-b-2 border-[#D4A373] transition flex items-center" data-tab="settings">
                ⚙️ Optionen
            </button>
            
            <div class="mt-auto p-4 bg-[#e9edc9] border-t-4 border-[#D4A373] text-sm text-[#4b5563] font-bold">
                <p id="passive-income-display" class="text-green-700 font-black mb-1 hidden"></p>
                <p>Info: 1 Tag = 10 Min.</p>
                <p class="mt-2 text-red-600 font-black animate-pulse" id="worker-warning" style="display:none;">Streik! Kein Geld!</p>
            </div>
        </div>

        <!-- Content Area -->
        <div class="flex-1 wood-panel bg-[#fefae0] p-6 overflow-y-auto h-[calc(100vh-7rem)] relative" id="content-area"></div>
    </div>

    <!-- Modal Overlay -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-60 z-[100] hidden flex justify-center items-center backdrop-blur-sm p-4">
        <div class="bg-[#fefae0] border-4 border-[#8B5A2B] p-6 rounded-3xl shadow-2xl max-w-2xl w-full transform transition-all flex flex-col max-h-[90vh]">
            <div class="flex justify-between items-center mb-4 border-b-2 border-[#D4A373] pb-2 shrink-0">
                <h2 id="modal-title" class="text-2xl font-black text-[#5d4037]">Titel</h2>
                <button id="modal-close" class="text-gray-500 hover:text-red-500 text-3xl font-black">&times;</button>
            </div>
            <div id="modal-content" class="overflow-y-auto pr-2 flex-1"></div>
        </div>
    </div>

async function initFirebase() {

                closeModal();

async function loadState() {
    let localData = null;
    try {
        const localStr = localStorage.getItem('jtFarmState');
        if (localStr) localData = JSON.parse(localStr);
    } catch(e) {}

    let cloudData = null;
    if (currentUserId && db) {
        try {
            const docRef = doc(db, 'users', currentUserId, 'game', 'farmState');
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) cloudData = docSnap.data();
        } catch(e) { console.error("Cloud Load failed", e); }
    }

    let bestData = localData;
    if (cloudData && localData) {
        if ((cloudData.lastTickTime || 0) > (localData.lastTickTime || 0)) bestData = cloudData;
    } else if (cloudData) {
        bestData = cloudData;
    }

    if (bestData) {
        const now = Date.now();
        const deltaMs = now - (bestData.lastTickTime || now);
        state = { ...state, ...bestData };
        if(!state.achievements) state.achievements = {};
        
        for(let key in state.inventory) { if(state.inventory[key] <= 0) delete state.inventory[key]; }
        
        if (deltaMs > 60000) { 
            simulateOfflineProgress(deltaMs);
            showNotification(`Willkommen zurück! Offline-Zeit berechnet.`, 'info');
        }
        state.lastTickTime = now;
    }
    updateFarmNameUI();
    if(state.activeTab) renderContent();
}

async function saveState() {
    state.lastTickTime = Date.now();
    try { localStorage.setItem('jtFarmState', JSON.stringify(state)); } catch(e) {}

    if (!currentUserId || !db || auth.currentUser?.isAnonymous) return;
    try {
        const docRef = doc(db, 'users', currentUserId, 'game', 'farmState');
        await setDoc(docRef, state);
    } catch(e) { console.error("Cloud Save failed", e); }
}

function simulateOfflineProgress(deltaMs) {
    let offlineDays = deltaMs / GAME_CONFIG.dayDurationMs;
    if (offlineDays > 30) offlineDays = 30; 
    const step = 0.1; 
    while(offlineDays > 0) {
        const currentStep = Math.min(step, offlineDays);
        state.timeElapsedDays += currentStep;
        if (!state.strike) { processFields(); processAnimals(); processMachines(); processWorkers(); }
        offlineDays -= currentStep;
    }
}

/** --- HELPER --- */
function formatTime(days) {
    if(days <= 0) return "Fertig!";
    let realSecs = Math.max(0, Math.ceil((days * GAME_CONFIG.dayDurationMs / state.timeScale) / 1000));
    return `${Math.floor(realSecs / 60)}m ${realSecs % 60}s`;
}
function getActualGrowTime(plant) { return plant.baseGrowTime * (1 - (state.upgrades?.fertilizer || 0) * 0.1); }
function addToInventory(id, amount) { if (!state.inventory[id]) state.inventory[id] = 0; state.inventory[id] += amount; }
function addSeed(id, amount) { if (!state.seeds[id]) state.seeds[id] = 0; state.seeds[id] += amount; }

/** --- GAME LOOP & LOGIK --- */
function gameLoop() {
    if(state.timeScale === 0) { requestAnimationFrame(gameLoop); return; } // Paused
    
    const now = Date.now();
    const dtReal = now - state.lastTickTime;
    state.lastTickTime = now;

    const daysPassed = (dtReal * state.timeScale) / GAME_CONFIG.dayDurationMs;
    state.timeElapsedDays += daysPassed;

    // Day 3 Auth Check
    if (state.timeElapsedDays >= 3 && auth.currentUser?.isAnonymous && !isForcedAuthModalOpen) {
        showAuthModal(true);
    }

    if (!state.strike) {
        processFields(); processAnimals(); processMachines(); processWorkers();
    }
    
    // Passive Income IT-Unternehmen
    if(state.itCompanies > 0 && !state.strike && state.hasPower) {
        state.money += state.itCompanies * 100 * daysPassed; // 100 per game day
    }

    checkAchievements();
    updateUI();
    
    if(state.activeTab === 'farm') updateFarmDOM();
    if(state.activeTab === 'machines') renderMachinesProgress();

    requestAnimationFrame(gameLoop);
}

function checkAchievements() {
    ACHIEVEMENTS.forEach(ach => {
        if(!state.achievements[ach.id] && ach.check(state)) {
            state.achievements[ach.id] = { unlockedAt: state.timeElapsedDays };
            state.money += ach.reward;
            showNotification(`Erfolg freigeschaltet: ${ach.name}! (+${ach.reward}€)`, 'success');
            if(state.activeTab === 'achievements') renderContent();
        }
    });
}

function processFields() {
    state.fields.forEach(field => {
        if (field.plantId && field.workerAssigned && !state.strike) {
            const plant = PLANTS[field.plantId];
            if (state.timeElapsedDays >= field.plantedAt + getActualGrowTime(plant)) {
                addToInventory(field.plantId, plant.yield);
                field.plantedAt = state.timeElapsedDays;
            }
        }
    });
}

function processAnimals() {
    state.animals.forEach(a => {
        const def = ANIMALS[a.type];
        if(def.needsWorker && (!a.workerAssigned || state.strike)) return;

        if (state.timeElapsedDays >= a.lastProduced + def.cycle) {
            def.products.forEach(prodId => addToInventory(prodId, 1));
            // Pig Truffle Logic
            if(def.special === 'trueffel' && Math.random() < 0.2) addToInventory('trueffel', 1);
            
            a.lastProduced = state.timeElapsedDays;
            a.producedCount = (a.producedCount || 0) + def.products.length;
        }
    });
}

function processMachines() {
    const factoryCount = state.machines.length;
    const requiredSolar = Math.floor(factoryCount / 5);
    state.hasPower = (state.solarPanels || 0) >= requiredSolar;
    
    document.getElementById('ui-power-warning').style.display = state.hasPower ? 'none' : 'block';
    if (!state.hasPower) return;

    let changed = false;
    state.machines.forEach(m => {
        const def = MACHINES[m.type];
        
        if(def.isRecycler) {
            if((m.itemsLoaded || 0) >= 5 && state.timeElapsedDays >= m.lastProduced + def.time) {
                m.itemsLoaded -= 5;
                addToInventory('plastik', 1);
                m.lastProduced = state.timeElapsedDays;
                changed = true;
            }
            return;
        }

        const recipes = def.recipes || [];
        const activeRecipeIndex = m.selectedRecipe || 0;
        const r = recipes[activeRecipeIndex] || recipes[0];
        
        if (state.timeElapsedDays >= m.lastProduced + r.time) {
            let canProduce = true;
            for (let id in r.input) { if ((state.inventory[id] || 0) < r.input[id]) { canProduce = false; break; } }

            if (canProduce) {
                for (let id in r.input) { state.inventory[id] -= r.input[id]; if(state.inventory[id]<=0) delete state.inventory[id]; }
                if(r.output) { for (let id in r.output) addToInventory(id, r.output[id]); }
                if(r.randomOutput) {
                    const roll = Math.random(); let cum = 0;
                    for(let ro of r.randomOutput) {
                        cum += ro.chance;
                        if(roll <= cum) { addToInventory(ro.id, 1); break; }
                    }
                }
                m.lastProduced = state.timeElapsedDays;
                changed = true;
            }
        }
    });
    if(changed && state.activeTab === 'inventory') renderContent(); 
}

function processWorkers() {
    if (state.timeElapsedDays >= state.nextPayday && state.workersTotal > 0) {
        const totalSalary = state.workersTotal * GAME_CONFIG.baseWorkerSalary;
        if (state.money >= totalSalary) {
            state.money -= totalSalary;
            state.nextPayday += 7;
            state.strike = false;
            document.getElementById('worker-warning').style.display = 'none';
        } else {
            if(!state.strike) {
                state.strike = true;
                document.getElementById('worker-warning').style.display = 'block';
                showNotification(`Streik! Löhne konnten nicht gezahlt werden!`, 'error');
            }
        }
    }
}

function calculateFieldCost() { return 100 * Math.pow(2, state.fields.length - 4); }

function buildFarmStatic() {
    const fc = document.getElementById('fields-container');
    const ac = document.getElementById('animals-container');
    if(!fc || !ac) return;

    fc.innerHTML = state.fields.map((field, idx) => `
        <div class="dirt-field h-32 cursor-pointer group flex flex-col justify-end items-center pb-2" onclick="handleFieldClick(${idx})" title="${field.plantId ? 'Wächst: '+PLANTS[field.plantId].name : 'Leer'}">
            ${field.workerAssigned ? `<div class="absolute top-1 right-1 bg-white rounded-full w-6 h-6 flex justify-center items-center shadow-md font-bold text-xs z-10 border border-gray-300">👷</div>` : ''}
            <div id="field-content-${idx}" class="w-16 h-16 mb-1 drop-shadow-xl"></div>
            <div class="w-11/12 h-2 bg-[#4e342e] rounded-full overflow-hidden mb-1"><div id="field-bar-${idx}" class="h-full bg-green-400" style="width:0%"></div></div>
            <div id="field-time-${idx}" class="text-[9px] font-black text-white drop-shadow-md">Leer</div>
        </div>
    `).join('');

    if(state.animals.length === 0) ac.innerHTML = `<span class="text-gray-500 w-full text-center font-bold">Keine Tiere.</span>`;
    else {
        const groups = {};
        state.animals.forEach(a => { if(!groups[a.type]) groups[a.type] = []; groups[a.type].push(a); });
        
        let html = '';
        for(let type in groups) {
            const list = groups[type];
            if(list.length > 10) html += renderAnimalNode(list[0], list.length, list); 
            else list.forEach(a => html += renderAnimalNode(a, 1, [a])); 
        }
        ac.innerHTML = html;
    }
    updateFarmDOM();
}

function renderAnimalNode(a, count, list) {
    const def = ANIMALS[a.type];
    const needsWorker = def.needsWorker;
    const totalProd = list.reduce((sum, an) => sum + (an.producedCount || 0), 0);
    const hasWorker = list.some(an => an.workerAssigned); 
    
    return `
    <div class="relative group cursor-pointer" onclick="handleAnimalClick('${a.id}', ${count > 1})">
        ${count > 1 ? `<div class="absolute -top-2 -right-2 bg-red-500 text-white font-black text-xs rounded-full w-6 h-6 flex justify-center items-center z-10 border-2 border-white shadow-md">${count}</div>` : ''}
        ${needsWorker && hasWorker ? `<div class="absolute -top-2 -left-2 bg-white rounded-full w-6 h-6 flex justify-center items-center shadow-md font-bold text-xs z-10 border border-gray-300">👷</div>` : ''}
        
        <div class="w-16 h-16 drop-shadow-xl transform transition hover:scale-110 hover:-translate-y-1">${SVG[a.type]}</div>
        
        <div class="animal-tooltip absolute bg-white border-4 border-[#8B5A2B] p-3 rounded-xl shadow-xl w-48 text-center pointer-events-none">
            <div class="font-black text-[#5d4037] border-b-2 border-gray-200 pb-1 mb-1">${def.name} ${count > 1 ? `(x${count})` : ''}</div>
            <div class="text-xs font-bold text-gray-600 mb-1">Prod: <span id="prod-count-${a.id}" class="text-green-600">${totalProd}</span>x</div>
            <div class="w-full bg-gray-200 h-2 rounded-full mb-1 overflow-hidden"><div id="animal-bar-${a.id}" class="bg-blue-400 h-full" style="width:0%"></div></div>
            <div id="animal-time-${a.id}" class="text-[9px] font-black text-blue-600 mb-2"></div>
            <div class="text-xs text-gray-500 font-bold mb-1">Klicken für Optionen</div>
        </div>
    </div>`;
}

function updateFarmDOM() {
    if (state.activeTab !== 'farm') return;

    state.fields.forEach((field, idx) => {
        const contentEl = document.getElementById(`field-content-${idx}`);
        const barEl = document.getElementById(`field-bar-${idx}`);
        const timeEl = document.getElementById(`field-time-${idx}`);
        if(!contentEl) return;

        if (!field.plantId) {
            if(contentEl.dataset.state !== 'empty') { contentEl.innerHTML = ''; contentEl.dataset.state = 'empty'; }
            barEl.style.width = '0%'; timeEl.innerText = 'Leer';
        } else {
            const plant = PLANTS[field.plantId];
            const growTime = getActualGrowTime(plant);
            const timeGrown = state.timeElapsedDays - field.plantedAt;
            const progress = Math.min(100, (timeGrown / growTime) * 100);
            const daysRemaining = growTime - timeGrown;
            
            barEl.style.width = `${progress}%`;
            
            if (progress >= 100) {
                if(contentEl.dataset.state !== 'grown') { contentEl.innerHTML = SVG[field.plantId]; contentEl.dataset.state = 'grown'; barEl.style.backgroundColor = '#FFC107'; }
                timeEl.innerText = 'Erntebereit!';
            } else {
                if(contentEl.dataset.state !== 'growing') { contentEl.innerHTML = SVG.sprout; contentEl.dataset.state = 'growing'; barEl.style.backgroundColor = '#4CAF50'; }
                timeEl.innerText = formatTime(daysRemaining);
            }
        }
    });

    const groups = {};
    state.animals.forEach(a => { if(!groups[a.type]) groups[a.type] = []; groups[a.type].push(a); });
    
    for(let type in groups) {
        const list = groups[type];
        if(list.length > 10) {
            updateSingleAnimalNode(list[0], list);
        } else {
            list.forEach(a => updateSingleAnimalNode(a, [a]));
        }
    }
}

function updateSingleAnimalNode(a, list) {
    const barEl = document.getElementById(`animal-bar-${a.id}`);
    const timeEl = document.getElementById(`animal-time-${a.id}`);
    const countEl = document.getElementById(`prod-count-${a.id}`);
    if(barEl) {
        const def = ANIMALS[a.type];
        const timeSince = state.timeElapsedDays - a.lastProduced;
        const prog = Math.min(100, (timeSince / def.cycle) * 100);
        
        let isWorking = true;
        if(def.needsWorker && (!a.workerAssigned || state.strike)) isWorking = false;

        barEl.style.width = `${prog}%`;
        
        if(!isWorking) {
            barEl.style.backgroundColor = '#fca5a5';
            timeEl.innerText = state.strike ? 'Streik!' : 'Arbeiter fehlt!';
        } else {
            barEl.style.backgroundColor = '#60a5fa';
            timeEl.innerText = formatTime(def.cycle - timeSince);
        }
        
        const totalProd = list.reduce((sum, an) => sum + (an.producedCount || 0), 0);
        if(countEl.innerText !== totalProd.toString()) countEl.innerText = totalProd;
    }
}

window.changeRecipe = function(type, recipeIndex) {
    state.machines.filter(m => m.type === type).forEach(m => m.selectedRecipe = parseInt(recipeIndex));
    renderMachinesProgress();
}

function renderMachinesProgress() {
    const container = document.getElementById('machines-container');
    if(!container) return;
    if (state.machines.length === 0) { container.innerHTML = `<div class="col-span-full text-center text-gray-500 font-bold py-10">Keine Fabriken.</div>`; return; }

    const groups = {};
    state.machines.forEach(m => { if(!groups[m.type]) groups[m.type] = []; groups[m.type].push(m); });

    let html = '';
    for(let type in groups) {
        const list = groups[type];
        const count = list.length;
        const def = MACHINES[type];
        const m = list[0]; 
        
        if(def.isRecycler) {
            const totalLoaded = list.reduce((s, an) => s + (an.itemsLoaded||0), 0);
            const maxCapacity = count * 5;
            const prog = Math.min(100, (totalLoaded / maxCapacity) * 100);
            html += `<div class="bg-white border-4 border-[#D4A373] rounded-2xl p-4 shadow-md flex flex-col relative">
                ${count > 1 ? `<div class="absolute -top-3 -right-3 bg-red-500 text-white font-black text-sm rounded-full w-8 h-8 flex justify-center items-center z-10 border-2 border-white shadow-md">x${count}</div>` : ''}
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-12 h-12">${SVG[def.id]}</div>
                    <div class="flex-1"><h3 class="text-lg font-black">${def.name}</h3></div>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2 mb-2"><div class="bg-orange-500 h-full" style="width: ${prog}%"></div></div>
                <div class="text-xs font-bold text-gray-600 mb-2">Items gesamt: ${totalLoaded}/${maxCapacity}</div>
                <button onclick="openRecycleGroupModal('${type}')" class="mt-auto bg-green-500 hover:bg-green-600 text-white py-2 rounded-lg font-bold w-full shadow">Material hinzufügen</button>
            </div>`;
            continue;
        }

        const recipes = def.recipes || [];
        const activeRecipeIndex = m.selectedRecipe || 0;
        const activeRecipe = recipes[activeRecipeIndex] || recipes[0];
        let hasInput = true;
        for(let id in activeRecipe.input) { if((state.inventory[id]||0) < activeRecipe.input[id]) {hasInput=false; break;} }

        const prog = Math.min(100, ((state.timeElapsedDays - m.lastProduced) / activeRecipe.time) * 100);
        const statusText = state.hasPower ? (hasInput ? (prog >= 100 ? "Fertig!" : "Läuft...") : "Material fehlt") : "Kein Strom";
        const statusColor = state.hasPower ? (hasInput ? "text-green-600" : "text-red-500") : "text-red-600";

        let recipeSelector = '';
        if (recipes.length > 1) {
            recipeSelector = `
                <select onchange="changeRecipe('${type}', this.value)" class="w-full text-xs font-bold p-1 rounded border mb-2 bg-gray-50 outline-none cursor-pointer">
                    ${recipes.map((r, i) => `<option value="${i}" ${i === activeRecipeIndex ? 'selected' : ''}>${r.name || 'Rezept '+(i+1)}</option>`).join('')}
                </select>
            `;
        }

        html += `
            <div class="bg-white border-4 border-[#D4A373] rounded-2xl p-4 shadow-md flex flex-col relative opacity-${state.hasPower? '100' : '60'}">
                ${count > 1 ? `<div class="absolute -top-3 -right-3 bg-red-500 text-white font-black text-sm rounded-full w-8 h-8 flex justify-center items-center z-10 border-2 border-white shadow-md">x${count}</div>` : ''}
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-12 h-12">${SVG[def.id]}</div>
                    <div class="flex-1"><h3 class="text-lg font-black">${def.name}</h3><p class="text-xs font-bold ${statusColor}">${statusText}</p></div>
                </div>
                ${recipeSelector}
                <div class="w-full bg-gray-200 rounded-full h-2 mb-3"><div class="bg-orange-500 h-full" style="width: ${hasInput&&state.hasPower ? prog : 0}%"></div></div>
                <div class="text-[10px] font-bold text-gray-600 flex gap-2">
                    <div class="bg-gray-50 p-1 flex-1 rounded border"><b>In:</b> ${Object.keys(activeRecipe.input).map(k=>`${activeRecipe.input[k]}x ${ITEMS[k]?.name}`).join(', ') || '-'}</div>
                    <div class="bg-gray-50 p-1 flex-1 rounded border"><b>Out:</b> ${activeRecipe.output ? Object.keys(activeRecipe.output).map(k=>ITEMS[k]?.name).join(', ') : 'Zufällig'}</div>
                </div>
            </div>`;
    }
    container.innerHTML = html;
}

/** --- INTERAKTIONEN --- */
window.handleFieldClick = function(idx) {
    const field = state.fields[idx];
    if (!field.plantId) openModal(`Feld ${idx+1} Bepflanzen`, generatePlantSelectionHTML(idx));
    else {
        const plant = PLANTS[field.plantId];
        const ready = state.timeElapsedDays >= field.plantedAt + getActualGrowTime(plant);
        if (ready) {
            addToInventory(field.plantId, plant.yield);
            field.plantId = null;
            document.getElementById(`field-content-${idx}`).dataset.state = 'empty';
            showNotification(`Ernte: + ${plant.yield}x ${plant.name}`, 'success');
            buildFarmStatic();
        } else {
            let html = `<div class="mb-4">Auf diesem Feld wächst aktuell <b>${plant.name}</b>.</div>
                <button onclick="clearField(${idx})" class="w-full bg-red-500 text-white font-bold py-2 rounded-xl mb-3">Pflanze entfernen (Abbrechen)</button>`;
            if (state.workersIdle > 0 && !field.workerAssigned) html += `<button onclick="assignWorkerField(${idx})" class="w-full bg-purple-500 text-white font-bold py-2 rounded-xl">Helfer zuweisen</button>`;
            else if (field.workerAssigned) html += `<button onclick="removeWorkerField(${idx})" class="w-full bg-orange-500 text-white font-bold py-2 rounded-xl">Helfer abziehen</button>`;
            openModal(`Feld ${idx+1} Verwalten`, html);
        }
    }
}

window.handleAnimalClick = function(id, isGrouped) {
    const aIdx = state.animals.findIndex(an => an.id === id);
    if(aIdx === -1) return;
    const a = state.animals[aIdx];
    const def = ANIMALS[a.type];
    
    let html = `<div class="mb-4 text-center">Was möchtest du mit dem ${def.name} tun?</div>`;
    
    if(def.needsWorker) {
        if(!a.workerAssigned && state.workersIdle > 0) html += `<button onclick="assignWorkerAnimal('${id}')" class="w-full bg-purple-500 text-white font-bold py-2 rounded-xl mb-3">Helfer zuweisen (braucht 1)</button>`;
        else if(a.workerAssigned) html += `<button onclick="removeWorkerAnimal('${id}')" class="w-full bg-orange-500 text-white font-bold py-2 rounded-xl mb-3">Helfer abziehen</button>`;
        else html += `<div class="text-red-500 font-bold mb-3 text-center">Keine freien Arbeiter!</div>`;
    }

    html += `<button onclick="sellAnimal('${id}')" class="w-full bg-red-500 text-white font-bold py-2 rounded-xl">Verkaufen (+${def.cost/2}€) ${isGrouped ? '(Verkauft nur 1)' : ''}</button>`;
    openModal(`${def.name} Verwalten`, html);
}

function generatePlantSelectionHTML(idx) {
    let html = `<div class="grid grid-cols-1 md:grid-cols-2 gap-3 max-h-[60vh] overflow-y-auto p-1">`;
    let hasSeed = false;
    for (let id in PLANTS) {
        if(state.seeds[id] > 0) {
            hasSeed = true;
            html += `<button class="bg-green-500 hover:bg-green-600 text-white flex items-center p-2 rounded-xl shadow" onclick="plantSeed(${idx}, '${id}')">
                <div class="w-10 h-10 mr-2">${SVG[id]}</div>
                <div class="text-left flex-1"><div class="font-black text-sm">${PLANTS[id].name}</div><div class="text-xs font-bold bg-green-700 px-1 rounded inline-block">Menge: ${Math.floor(state.seeds[id])}</div></div>
            </button>`;
        }
    }
    if(!hasSeed) html += `<div class="col-span-full text-center py-4 font-bold text-gray-500">Kein Saatgut. Kaufe es im Shop!</div>`;
    return html + `</div>`;
}

window.clearField = function(idx) { state.fields[idx].plantId = null; closeModal(); buildFarmStatic(); }
window.plantSeed = function(idx, pId) { if(state.seeds[pId]>0){ state.seeds[pId]--; state.fields[idx].plantId = pId; state.fields[idx].plantedAt = state.timeElapsedDays; closeModal(); buildFarmStatic(); } }
window.assignWorkerField = function(idx) { if(state.workersIdle>0){ state.workersIdle--; state.fields[idx].workerAssigned=true; closeModal(); buildFarmStatic(); } }
window.removeWorkerField = function(idx) { if(state.fields[idx].workerAssigned){ state.fields[idx].workerAssigned=false; state.workersIdle++; closeModal(); buildFarmStatic(); } }

window.assignWorkerAnimal = function(id) {
    const a = state.animals.find(an => an.id === id);
    if(a && state.workersIdle>0){ state.workersIdle--; a.workerAssigned=true; closeModal(); buildFarmStatic(); }
}
window.removeWorkerAnimal = function(id) {
    const a = state.animals.find(an => an.id === id);
    if(a && a.workerAssigned){ a.workerAssigned=false; state.workersIdle++; closeModal(); buildFarmStatic(); }
}

window.buySeed = function(id) { const p=PLANTS[id]; if(state.money>=p.seedCost){state.money-=p.seedCost; addSeed(id,1); showNotification(`${p.name}-Samen!`, 'success'); updateUI(); changeTab('shop');} else showNotification('Zu wenig Geld', 'error'); }
window.buyAnimal = function(id) { const a=ANIMALS[id]; if(a.max && state.animals.filter(an=>an.type===id).length>=a.max){showNotification(`Maximal ${a.max}!`, 'error'); return;} if(state.money>=a.cost){state.money-=a.cost; state.animals.push({id:'a'+Date.now()+Math.random(), type:id, lastProduced:state.timeElapsedDays, producedCount:0, workerAssigned:false}); showNotification(`${a.name} gekauft!`, 'success'); updateUI();} else showNotification('Zu wenig Geld', 'error'); }
window.sellAnimal = function(id) { const idx=state.animals.findIndex(a=>a.id===id); if(idx>-1){ const a=state.animals[idx]; state.money+=ANIMALS[a.type].cost/2; if(a.workerAssigned) state.workersIdle++; state.animals.splice(idx,1); closeModal(); buildFarmStatic(); updateUI(); showNotification('Verkauft!', 'success'); } }
window.buyMachine = function(id) { const m=MACHINES[id]; if(state.money>=m.cost){state.money-=m.cost; state.machines.push({type:id, lastProduced:state.timeElapsedDays, itemsLoaded:0, selectedRecipe: 0}); showNotification(`${m.name} gebaut!`, 'success'); updateUI(); changeTab('shop');} else showNotification('Zu wenig Geld', 'error'); }

window.buyWorker = function() { if(state.money>=200){state.money-=200; state.workersTotal++; state.workersIdle++; showNotification('Helfer eingestellt!', 'success'); updateUI();} else showNotification('Zu wenig Geld', 'error'); }
window.buyField = function() { const c=calculateFieldCost(); if(state.money>=c){state.money-=c; state.fields.push({id:state.fields.length, plantId:null, plantedAt:null, workerAssigned:false}); showNotification('Feld erweitert!', 'success'); changeTab('shop');} else showNotification('Zu wenig Geld', 'error'); }
window.buyFertilizer = function() { const l=state.upgrades.fertilizer||0; const c=500*(l+1); if(l>=5)return; if(state.money>=c){state.money-=c; state.upgrades.fertilizer=l+1; showNotification('Dünger Upgrade!', 'success'); changeTab('shop');} else showNotification('Zu wenig Geld', 'error'); }
window.buySolar = function() { const c=2000*(state.solarPanels+1); if(state.money>=c){state.money-=c; state.solarPanels++; showNotification('Solaranlage gebaut!', 'success'); changeTab('shop');} else showNotification('Zu wenig Geld', 'error'); }
window.buyITCompany = function() {
    if((state.inventory.computer||0)>=3 && (state.inventory.rechencenter||0)>=2) {
        state.inventory.computer-=3; state.inventory.rechencenter-=2;
        state.itCompanies++; showNotification('IT-Firma gegründet!', 'success'); changeTab('shop');
    } else showNotification('Material fehlt!', 'error');
}

window.sellItem = function(id) { if(state.inventory[id]>0){state.inventory[id]--; state.money+=ITEMS[id].sellPrice; renderContent();} }
window.sellAll = function() {
    let e=0; for(let id in state.inventory){if(state.inventory[id]>0){e+=state.inventory[id]*ITEMS[id].sellPrice; delete state.inventory[id];}}
    if(e>0){state.money+=e; showNotification(`+${e}€`, 'success'); renderContent();}
}
window.endStrike = function() { 
    if(!state.strike) { showNotification('Kein Streik!', 'info'); return; }
    const d=state.workersTotal*GAME_CONFIG.baseWorkerSalary; 
    if(state.money>=d){state.money-=d; state.strike=false; state.nextPayday=state.timeElapsedDays+7; document.getElementById('worker-warning').style.display='none'; showNotification('Schulden bezahlt!', 'success'); renderContent(); } 
    else showNotification('Zu wenig Geld!', 'error'); 
}

window.renameFarm = function() { const n=prompt("Name:", state.farmName); if(n && n.trim()!==''){state.farmName=n.trim(); updateFarmNameUI(); if(state.activeTab === 'settings') renderContent();} }

/* ADMIN FUNKTIONEN */
window.adminGiveMoney = function() { state.money += 1000000; updateUI(); showNotification("Admin: +1M€", "success"); }
window.adminTriggerStrike = function() { state.money = 0; state.strike = true; document.getElementById('worker-warning').style.display = 'block'; showNotification("Admin: Streik ausgelöst!", "error"); renderContent(); }
window.adminUnlockAll = function() { state.adminUnlockAll = true; showNotification("Admin: Fabriken freigeschaltet!", "success"); }

/* EXPORT / IMPORT FUNKTIONEN */
window.exportSave = async function() {
    const saveStr = btoa(JSON.stringify(state));
    try {
        await navigator.clipboard.writeText(saveStr);
        showNotification("Spielstand erfolgreich kopiert!", "success");
    } catch(err) {
        prompt("Kopiere diesen Code (Strg+C / Cmd+C):", saveStr);
    }
}
window.importSave = function() {
    const saveStr = prompt("Füge hier deinen kopierten Spielstand-Code ein:");
    if(saveStr) {
        try {
            const parsed = JSON.parse(atob(saveStr));
            if(parsed && typeof parsed === 'object') {
                state = { ...state, ...parsed };
                saveState();
                updateFarmNameUI();
                showNotification("Spielstand erfolgreich geladen!", "success");
                changeTab('farm');
            }
        } catch(e) {
            showNotification("Fehlerhafter Code!", "error");
        }
    }
}
window.resetGame = function() {
    if(confirm("Möchtest du WIRKLICH von vorne anfangen? Dieser Schritt kann nicht rückgängig gemacht werden!")) {
        localStorage.removeItem('jtFarmState');
        location.reload();
    }
}

window.openRecycleGroupModal = function(type) {
    const list = state.machines.filter(m => m.type === type);
    if(list.length === 0) return;
    
    // The target is the first machine in this group that has space
    const targetIdx = state.machines.findIndex(m => m.type === type && (m.itemsLoaded||0) < 5);
    
    const totalLoaded = list.reduce((s, m) => s + (m.itemsLoaded||0), 0);
    const maxCapacity = list.length * 5;

    let html = `<div class="mb-4">Wähle ein Item zum Recyceln. (Status: ${totalLoaded}/${maxCapacity})</div><div class="grid grid-cols-2 gap-2 max-h-[50vh] overflow-y-auto">`;
    for(let id in state.inventory) {
        if(state.inventory[id] > 0) {
            // We pass the exact machine index we want to fill to ensure it works properly
            html += `<button onclick="recycleItemGroup('${id}', ${targetIdx})" class="bg-gray-100 hover:bg-gray-200 p-2 rounded flex justify-between items-center border">
                <span class="font-bold">${ITEMS[id].name} (x${Math.floor(state.inventory[id])})</span>
                <span class="w-8 h-8 drop-shadow-md">${SVG[id]||''}</span>
            </button>`;
        }
    }
    if(Object.keys(state.inventory).length===0) html += `<div>Inventar leer.</div>`;
    html += `</div>`;
    openModal('Recycling', html);
}

window.recycleItemGroup = function(id, targetIdx) {
    if(targetIdx === -1) {
        showNotification('Alle Recycler sind voll!', 'error');
        return;
    }
    if(state.inventory[id] > 0) {
        state.inventory[id]--;
        if(state.inventory[id] <= 0) delete state.inventory[id];
        
        const target = state.machines[targetIdx];
        target.itemsLoaded = (target.itemsLoaded || 0) + 1;
        
        const type = target.type;
        const list = state.machines.filter(m => m.type === type);
        const totalLoaded = list.reduce((s, m) => s + (m.itemsLoaded||0), 0);
        const maxCapacity = list.length * 5;
        
        if(totalLoaded >= maxCapacity) closeModal(); 
        else openRecycleGroupModal(type); 
    }
}

/** --- MODALS & NOTIFICATIONS --- */
function openModal(t, c, forced = false) { 
    document.getElementById('modal-title').innerText=t; 
    document.getElementById('modal-content').innerHTML=c; 
    document.getElementById('modal-close').style.display = forced ? 'none' : 'block';
    document.getElementById('modal').classList.remove('hidden'); 
}
window.closeModal = function() { 
    if(!isForcedAuthModalOpen) document.getElementById('modal').classList.add('hidden'); 
}
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal').addEventListener('click', (e) => { if (e.target.id === 'modal' && !isForcedAuthModalOpen) closeModal(); });
document.querySelectorAll('.nav-btn').forEach(b => b.addEventListener('click', () => changeTab(b.dataset.tab)));

const speedBtn = document.getElementById('btn-speed');
speedBtn.addEventListener('click', () => {
    if(state.timeScale===1){ state.timeScale=60; speedBtn.innerText="60x (Admin)"; speedBtn.classList.replace('bg-red-500','bg-yellow-500'); }
    else { state.timeScale=1; speedBtn.innerText="Admin Zeitraffer"; speedBtn.classList.replace('bg-yellow-500','bg-red-500'); }
});

function showNotification(msg, type) {
    const t = document.createElement('div');
    t.className = `fixed bottom-6 right-6 px-6 py-4 rounded-2xl shadow-2xl font-black text-white transform transition-all duration-300 translate-y-20 opacity-0 z-[200] border-b-4 ${type==='success'?'bg-green-500 border-green-700':type==='error'?'bg-red-500 border-red-700':'bg-blue-500 border-blue-700'}`;
    t.innerText = msg; document.body.appendChild(t);
    setTimeout(() => t.classList.remove('translate-y-20', 'opacity-0'), 10);
    setTimeout(() => { t.classList.add('translate-y-20', 'opacity-0'); setTimeout(() => t.remove(), 300); }, 3000);
}

initFirebase();
updateFarmNameUI();
changeTab('farm');
</script>
