<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScribbleCode V3 - High Precision</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1d; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: #25252b; padding: 20px; border-radius: 15px; text-align: center; max-width: 90vw; }
        input { width: 80%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: none; }
        button, label { background: #3a7794; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; margin: 5px; display: inline-block; }
        canvas { margin-top: 15px; background: #fdfaf0; border-radius: 10px; max-width: 100%; height: auto; cursor: crosshair; }
        .output { margin-top: 15px; padding: 10px; background: #000; color: #0f0; font-family: monospace; border-radius: 5px; min-height: 40px; text-align: left; }
        #fileInput { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h2>ScribbleCode V3</h2>
        <input type="text" id="inputText" value="GEHEIM123">
        <div class="btn-group">
            <button onclick="generateCode()">Generieren</button>
            <button style="background:#2e7d32" onclick="downloadImage()">Speichern</button>
            <label for="fileInput">Hochladen</label>
            <input type="file" id="fileInput" accept="image/*" onchange="handleUpload(event)">
        </div>

        <canvas id="codeCanvas" width="600" height="600"></canvas>
        <div id="status">Bereit.</div>
        <div id="outputText" class="output">Ergebnis...</div>
    </div>

    <script>
        const canvas = document.getElementById('codeCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        // Die Ziel-Farbe aus deinem Bild
        const TARGET_COLOR = { r: 58, g: 119, b: 148 }; 

        function generateCode() {
            const text = document.getElementById('inputText').value;
            const w = canvas.width, h = canvas.height;
            
            // Hintergrund & Gitter
            ctx.fillStyle = "#fdfaf0";
            ctx.fillRect(0, 0, w, h);
            ctx.strokeStyle = "#e0e2e5";
            ctx.lineWidth = 2;
            for(let i=1; i<6; i++) {
                ctx.beginPath(); ctx.moveTo(w*i/6, 0); ctx.lineTo(w*i/6, h); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, h*i/6); ctx.lineTo(w, h*i/6); ctx.stroke();
            }

            const bytes = new TextEncoder().encode(text);
            let nibbles = [];
            for (let b of bytes) { nibbles.push(b >> 4); nibbles.push(b & 0x0F); }

            const pad = w * 0.15;
            const stepX = (w - 2 * pad) / (nibbles.length - 1);

            ctx.beginPath();
            ctx.strokeStyle = `rgb(${TARGET_COLOR.r},${TARGET_COLOR.g},${TARGET_COLOR.b})`;
            ctx.lineWidth = 10;
            ctx.lineJoin = "round";
            ctx.lineCap = "round";

            for (let i = 0; i < nibbles.length; i++) {
                const x = pad + i * stepX;
                const valNorm = nibbles[i] / 15;
                const y = (i % 2 === 0) ? pad + valNorm * (h * 0.35) : h - pad - valNorm * (h * 0.35);
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();
            document.getElementById('status').innerText = "Code generiert.";
        }

        function handleUpload(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    scanImage();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function scanImage() {
            const w = canvas.width, h = canvas.height;
            const imgData = ctx.getImageData(0, 0, w, h).data;
            let points = [];

            // Pixel-Analyse
            for (let x = 0; x < w; x++) {
                let foundY = [];
                for (let y = 0; y < h; y++) {
                    const i = (y * w + x) * 4;
                    // Großzügigere Farberkennung (Toleranz 60 statt 40)
                    const dr = Math.abs(imgData[i] - TARGET_COLOR.r);
                    const dg = Math.abs(imgData[i+1] - TARGET_COLOR.g);
                    const db = Math.abs(imgData[i+2] - TARGET_COLOR.b);
                    
                    if (dr < 60 && dg < 60 && db < 60) {
                        foundY.push(y);
                    }
                }
                if (foundY.length > 0) {
                    points.push({x, y: foundY.reduce((a,b)=>a+b)/foundY.length});
                }
            }

            // Spitzen finden
            let peaks = [];
            for (let i = 2; i < points.length - 2; i++) {
                const curr = points[i].y;
                const isMin = curr < points[i-1].y && curr < points[i-2].y && curr < points[i+1].y && curr < points[i+2].y;
                const isMax = curr > points[i-1].y && curr > points[i-2].y && curr > points[i+1].y && curr > points[i+2].y;
                
                if (isMin || isMax) {
                    if (peaks.length === 0 || Math.abs(points[i].x - peaks[peaks.length-1].x) > 10) {
                        peaks.push(points[i]);
                        // Zeichne Scan-Punkt zur Kontrolle
                        ctx.fillStyle = "red";
                        ctx.fillRect(points[i].x-2, points[i].y-2, 4, 4);
                    }
                }
            }

            // Dekodieren
            const pad = h * 0.15;
            const range = h * 0.35;
            let nibbles = [];
            peaks.forEach((p, i) => {
                let v = (i % 2 === 0) ? (p.y - pad) / range : (h - pad - p.y) / range;
                nibbles.push(Math.max(0, Math.min(15, Math.round(v * 15))));
            });

            let bytes = [];
            for(let i=0; i<nibbles.length; i+=2) if(nibbles[i+1]!==undefined) bytes.push((nibbles[i]<<4)|nibbles[i+1]);

            const result = new TextDecoder().decode(new Uint8Array(bytes));
            document.getElementById('outputText').innerText = result || "Fehler beim Lesen";
            document.getElementById('status').innerText = "Scan abgeschlossen.";
        }

        function downloadImage() {
            const link = document.createElement('a');
            link.download = 'scribble.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        window.onload = generateCode;
    </script>
</body>
</html>
