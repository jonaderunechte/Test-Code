<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JT Farm Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #557A46;
            background-image: 
                radial-gradient(#4b6e3d 15%, transparent 16%), 
                radial-gradient(#4b6e3d 15%, transparent 16%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
        }

        .wood-panel {
            background-color: #D4A373;
            background-image: repeating-linear-gradient(to bottom, transparent, transparent 20px, rgba(0,0,0,0.05) 20px, rgba(0,0,0,0.05) 22px);
            border: 6px solid #8B5A2B;
            border-radius: 16px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1), 4px 4px 10px rgba(0,0,0,0.3);
        }

        .dirt-field {
            background-color: #6d4c41;
            /* Cartoon Ploughed Field Texture */
            background-image: repeating-linear-gradient( 0deg, #6d4c41, #6d4c41 15px, #5d4037 15px, #5d4037 30px );
            border: 6px solid #4e342e;
            border-radius: 12px;
            position: relative;
            box-shadow: inset 2px 2px 12px rgba(0,0,0,0.6);
            transition: transform 0.1s;
        }

        .dirt-field:active { transform: scale(0.98); }

        .svg-icon {
            width: 100%;
            height: 100%;
            filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.3));
        }

        /* Hover Tooltip */
        .animal-tooltip {
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.2s;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }
        .group:hover .animal-tooltip {
            visibility: visible;
            opacity: 1;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #e0e0e0; border-radius: 8px; }
        ::-webkit-scrollbar-thumb { background: #8B5A2B; border-radius: 8px; }
        ::-webkit-scrollbar-thumb:hover { background: #5d4037; }

        .tab-active { background-color: #8B5A2B; color: white; }
        .tab-inactive { background-color: #e5e7eb; color: #4b5563; }
        .tab-inactive:hover { background-color: #d1d5db; }

        #loading-screen {
            position: fixed; inset: 0; background: #557A46; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center; color: white;
        }
    </style>
</head>
<body class="min-h-screen text-gray-800 selection:bg-green-300">

    <div id="loading-screen">
        <h1 class="text-5xl font-black mb-4">JT Farm lädt...</h1>
        <p class="text-xl">Cloud-Speicherstand wird synchronisiert...</p>
    </div>

    <!-- Top Navigation / Stats -->
    <div class="fixed top-0 w-full bg-[#fefae0] shadow-md z-50 p-3 flex justify-between items-center border-b-8 border-[#8B5A2B]">
        <div class="flex space-x-4 items-center flex-wrap">
            <div class="flex items-center gap-2 bg-white px-3 py-1 rounded-lg border-2 border-gray-300 shadow-sm cursor-pointer hover:bg-gray-50" onclick="renameFarm()">
                <h1 id="ui-farmname" class="text-2xl font-black text-[#557A46]">JT Farm</h1>
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
            </div>
            
            <div class="text-xl font-bold bg-yellow-100 text-yellow-800 px-4 py-2 rounded-xl border-4 border-yellow-400 shadow-sm flex items-center gap-2">
                <span class="font-black">Geld:</span> <span id="ui-money">0</span> €
            </div>
            <div class="text-lg font-bold bg-blue-100 text-blue-800 px-4 py-2 rounded-xl border-4 border-blue-400 shadow-sm">
                Tag <span id="ui-day">1</span> - <span id="ui-time">00:00</span>
            </div>
            <div class="text-lg font-bold bg-orange-100 text-orange-800 px-4 py-2 rounded-xl border-4 border-orange-400 shadow-sm" title="Freie Arbeiter / Gesamte Arbeiter">
                Arbeiter: <span id="ui-workers">0/0</span>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button id="btn-speed" class="hidden bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-xl border-b-4 border-red-700 shadow font-black transition active:translate-y-1 active:border-b-0">Admin Zeitraffer</button>
        </div>
    </div>

    <!-- Main Container -->
    <div class="pt-24 pb-6 px-4 max-w-7xl mx-auto flex gap-6 h-screen">
        
        <!-- Sidebar Navigation -->
        <div class="w-64 wood-panel flex flex-col overflow-hidden h-[calc(100vh-7rem)] bg-[#FAEDCD]">
            <div class="bg-[#8B5A2B] text-white text-center py-4 font-black text-2xl uppercase tracking-widest border-b-4 border-[#5d4037]">Menü</div>
            <button class="nav-btn tab-active p-4 text-left font-bold text-lg border-b-2 border-[#D4A373] transition flex items-center" data-tab="farm">
                <svg class="w-6 h-6 mr-3 text-gray-700" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3L4 9v12h16V9l-8-6zm6 16h-3v-6H9v6H6v-9l6-4.5 6 4.5v9z"/></svg> Meine Farm
            </button>
            <button class="nav-btn tab-inactive p-4 text-left font-bold text-lg border-b-2 border-[#D4A373] transition flex items-center" data-tab="inventory">
                <svg class="w-6 h-6 mr-3 text-gray-700" fill="currentColor" viewBox="0 0 24 24"><path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z"/></svg> Inventar
            </button>
            <button class="nav-btn tab-inactive p-4 text-left font-bold text-lg border-b-2 border-[#D4A373] transition flex items-center" data-tab="shop">
                <svg class="w-6 h-6 mr-3 text-gray-700" fill="currentColor" viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg> Shop
            </button>
            <button class="nav-btn tab-inactive p-4 text-left font-bold text-lg border-b-2 border-[#D4A373] transition flex items-center" data-tab="machines">
                <svg class="w-6 h-6 mr-3 text-gray-700" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12h7v7h-7zm1 2h5v3h-5zM4 6h16v2H4zm0 5h6v8H4z"/></svg> Fabriken
            </button>
            
            <div class="mt-auto p-4 bg-[#e9edc9] border-t-4 border-[#D4A373] text-sm text-[#4b5563] font-bold">
                <p>Info: 1 Tag = 10 Min. Spielzeit.</p>
                <p>Speichert automatisch.</p>
                <p class="mt-2 text-red-600 font-black animate-pulse" id="worker-warning" style="display:none;">Achtung! Arbeiter streiken! Kein Geld!</p>
            </div>
        </div>

        <!-- Content Area -->
        <div class="flex-1 wood-panel bg-[#fefae0] p-6 overflow-y-auto h-[calc(100vh-7rem)] relative" id="content-area">
            <!-- Dynamic Content -->
        </div>

    </div>

    <!-- Modal Overlay -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-60 z-[100] hidden flex justify-center items-center backdrop-blur-sm">
        <div class="bg-[#fefae0] border-4 border-[#8B5A2B] p-6 rounded-3xl shadow-2xl max-w-lg w-full transform transition-all">
            <div class="flex justify-between items-center mb-4 border-b-2 border-[#D4A373] pb-2">
                <h2 id="modal-title" class="text-2xl font-black text-[#5d4037]">Titel</h2>
                <button id="modal-close" class="text-gray-500 hover:text-red-500 text-3xl font-black">&times;</button>
            </div>
            <div id="modal-content" class="max-h-[60vh] overflow-y-auto pr-2"></div>
        </div>
    </div>

/** --- FIREBASE SETUP & PERSISTENCE --- */
let db, auth, currentUserId;
const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

async function initFirebase() {
    try {
        const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
        const app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);

        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
            await signInWithCustomToken(auth, __initial_auth_token);
        } else {
            await signInAnonymously(auth);
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUserId = user.uid;
                await loadState();
                document.getElementById('loading-screen').style.display = 'none';
                requestAnimationFrame(gameLoop);
                setInterval(saveState, 10000); // Save every 10s
            }
        });
    } catch (e) {
        console.error("Firebase init failed, running in-memory fallback", e);
        document.getElementById('loading-screen').style.display = 'none';
        requestAnimationFrame(gameLoop);
    }
}

async function loadState() {
    if (!currentUserId || !db) return;
    try {
        const docRef = doc(db, 'artifacts', appId, 'users', currentUserId, 'farmState');
        const docSnap = await getDoc(docRef);
        if (docSnap.exists()) {
            const savedState = docSnap.data();
            const now = Date.now();
            const deltaMs = now - (savedState.lastTickTime || now);
            
            state = { ...state, ...savedState };
            
            if (deltaMs > 60000) { 
                simulateOfflineProgress(deltaMs);
                showNotification(`Willkommen zurück! Offline-Zeit berechnet.`, 'info');
            }
            state.lastTickTime = now;
        }
    } catch(e) { console.error("Load failed", e); }
    updateFarmNameUI();
}

async function saveState() {
    if (!currentUserId || !db) return;
    state.lastTickTime = Date.now();
    try {
        const docRef = doc(db, 'artifacts', appId, 'users', currentUserId, 'farmState');
        await setDoc(docRef, state);
    } catch(e) { console.error("Save failed", e); }
}

function simulateOfflineProgress(deltaMs) {
    let offlineDays = deltaMs / GAME_CONFIG.dayDurationMs;
    if (offlineDays > 30) offlineDays = 30; // Cap to max 30 days
    
    const step = 0.1; 
    while(offlineDays > 0) {
        const currentStep = Math.min(step, offlineDays);
        state.timeElapsedDays += currentStep;
        
        if (!state.strike) {
            processFields();
            processAnimals();
            processMachines();
            processWorkers();
        }
        offlineDays -= currentStep;
    }
}

/** --- TIME FORMAT HELPER --- */
function formatRemainingTime(gameDaysRemaining) {
    if(gameDaysRemaining <= 0) return "Fertig!";
    let realSeconds = Math.max(0, Math.ceil((gameDaysRemaining * GAME_CONFIG.dayDurationMs / state.timeScale) / 1000));
    let m = Math.floor(realSeconds / 60);
    let s = realSeconds % 60;
    return `${m}m ${s}s`;
}

/** --- GAME LOOP & LOGIK --- */
function gameLoop() {
    const now = Date.now();
    const dtReal = now - state.lastTickTime;
    state.lastTickTime = now;

    const gameMsPassed = dtReal * state.timeScale;
    const daysPassed = gameMsPassed / GAME_CONFIG.dayDurationMs;
    state.timeElapsedDays += daysPassed;

    if (!state.strike) {
        processFields();
        processAnimals();
        processMachines();
        processWorkers();
    }

    updateUI();
    
    // Smooth updates WITHOUT destroying the DOM
    if(state.activeTab === 'farm') updateFarmDOM();
    if(state.activeTab === 'machines') renderMachinesProgress();

    requestAnimationFrame(gameLoop);
}

function processFields() {
    state.fields.forEach(field => {
        if (field.plantId && field.workerAssigned) {
            const plant = PLANTS[field.plantId];
            if (state.timeElapsedDays >= field.plantedAt + plant.growTime) {
                addToInventory(field.plantId, plant.yield);
                field.plantedAt = state.timeElapsedDays; // Auto replant
            }
        }
    });
}

function processAnimals() {
    state.animals.forEach(animalData => {
        const animalDef = ANIMALS[animalData.type];
        if (state.timeElapsedDays >= animalData.lastProduced + animalDef.cycle) {
            animalDef.products.forEach(prodId => addToInventory(prodId, 1));
            animalData.lastProduced = state.timeElapsedDays;
            animalData.producedCount = (animalData.producedCount || 0) + animalDef.products.length;
        }
    });
}

function processMachines() {
    let changed = false;
    state.machines.forEach(machineData => {
        const machineDef = MACHINES[machineData.type];
        if (state.timeElapsedDays >= machineData.lastProduced + machineDef.time) {
            let canProduce = true;
            for (let inputId in machineDef.input) {
                if ((state.inventory[inputId] || 0) < machineDef.input[inputId]) {
                    canProduce = false; break;
                }
            }

            if (canProduce) {
                for (let inputId in machineDef.input) state.inventory[inputId] -= machineDef.input[inputId];
                for (let outputId in machineDef.output) {
                    if(machineDef.autoSell) state.money += ITEMS[outputId].sellPrice * machineDef.output[outputId];
                    else addToInventory(outputId, machineDef.output[outputId]);
                }
                machineData.lastProduced = state.timeElapsedDays;
                changed = true;
            }
        }
    });
    if(changed && state.activeTab === 'inventory') renderContent(); 
}

function processWorkers() {
    if (state.timeElapsedDays >= state.nextPayday && state.workersTotal > 0) {
        const totalSalary = state.workersTotal * GAME_CONFIG.baseWorkerSalary;
        if (state.money >= totalSalary) {
            state.money -= totalSalary;
            state.nextPayday += 7;
            showNotification(`Löhne bezahlt: -${totalSalary}€`, 'info');
        } else {
            state.strike = true;
            document.getElementById('worker-warning').style.display = 'block';
            showNotification(`Streik! Nicht genug Geld für Löhne!`, 'error');
        }
    }
}

function addToInventory(id, amount) {
    if (!state.inventory[id]) state.inventory[id] = 0;
    state.inventory[id] += amount;
}
function addSeed(id, amount) {
    if (!state.seeds[id]) state.seeds[id] = 0;
    state.seeds[id] += amount;
}

function calculateFieldCost() {
    return 100 * Math.pow(2, state.fields.length - 4); 
}

/** * Build DOM exactly ONCE per tab visit to prevent visual resets of the progress bar 
 */
function buildFarmStatic() {
    const fieldsContainer = document.getElementById('fields-container');
    const animalsContainer = document.getElementById('animals-container');
    if(!fieldsContainer || !animalsContainer) return;

    fieldsContainer.innerHTML = state.fields.map((field, idx) => `
        <div class="dirt-field h-40 cursor-pointer group flex flex-col justify-end items-center pb-2" onclick="handleFieldClick(${idx})">
            ${field.workerAssigned ? `<div class="absolute top-2 right-2 bg-white rounded-full w-8 h-8 flex justify-center items-center shadow-md font-bold text-xs z-10 border-2 border-gray-200"><svg class="w-4 h-4 text-gray-800" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div>` : ''}
            
            <div id="field-content-${idx}" class="w-20 h-20 mb-1 drop-shadow-xl"></div>
            
            <div class="w-11/12 h-3 bg-[#4e342e] rounded-full overflow-hidden border-2 border-[#3e2723] mb-1">
                <div id="field-bar-${idx}" class="h-full bg-green-400" style="width: 0%"></div>
            </div>
            
            <div id="field-time-${idx}" class="text-[10px] font-black text-white drop-shadow-md">Leer</div>
        </div>
    `).join('');

    if(state.animals.length === 0) {
        animalsContainer.innerHTML = `<span class="text-gray-500 w-full text-center font-bold">Keine Tiere vorhanden.</span>`;
    } else {
        animalsContainer.innerHTML = state.animals.map((a) => {
            const def = ANIMALS[a.type];
            return `
            <div class="relative group cursor-pointer" id="animal-node-${a.id}">
                <div class="w-20 h-20 drop-shadow-xl transform transition hover:scale-110 hover:-translate-y-2">
                    ${SVG[a.type]}
                </div>
                <!-- Tooltip -->
                <div class="animal-tooltip absolute bg-white border-4 border-[#8B5A2B] p-3 rounded-2xl shadow-xl w-48 text-center" id="tooltip-${a.id}">
                    <div class="font-black text-[#5d4037] border-b-2 border-gray-200 pb-1 mb-2">${def.name}</div>
                    
                    <div class="text-xs font-bold text-gray-600 mb-1">Erzeugt: ${def.products.map(p=>ITEMS[p].name).join(', ')}</div>
                    <div class="text-xs font-bold text-gray-600 mb-2">Bisher produziert: <span id="prod-count-${a.id}" class="text-green-600">${a.producedCount||0}</span>x</div>
                    
                    <div class="w-full bg-gray-200 h-2 rounded-full mb-1 overflow-hidden">
                        <div id="animal-bar-${a.id}" class="bg-blue-400 h-full" style="width:0%"></div>
                    </div>
                    <div id="animal-time-${a.id}" class="text-[10px] font-black text-blue-600 mb-2 text-left"></div>

                    <button onclick="sellAnimal('${a.id}')" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-1 rounded-lg text-xs shadow">Verkaufen (+${def.cost/2}€)</button>
                </div>
            </div>`;
        }).join('');
    }
    updateFarmDOM();
}

/**
 * Update logic that does NOT rebuild the HTML to prevent flickering
 */
function updateFarmDOM() {
    if (state.activeTab !== 'farm') return;

    // Fields
    state.fields.forEach((field, idx) => {
        const contentEl = document.getElementById(`field-content-${idx}`);
        const barEl = document.getElementById(`field-bar-${idx}`);
        const timeEl = document.getElementById(`field-time-${idx}`);
        if(!contentEl || !barEl || !timeEl) return;

        if (!field.plantId) {
            if(contentEl.dataset.state !== 'empty') {
                contentEl.innerHTML = '';
                contentEl.dataset.state = 'empty';
            }
            barEl.style.width = '0%';
            timeEl.innerText = 'Leer';
        } else {
            const plant = PLANTS[field.plantId];
            const timeGrown = state.timeElapsedDays - field.plantedAt;
            const progress = Math.min(100, (timeGrown / plant.growTime) * 100);
            const daysRemaining = plant.growTime - timeGrown;
            
            barEl.style.width = `${progress}%`;
            
            if (progress >= 100) {
                if(contentEl.dataset.state !== 'grown') {
                    contentEl.innerHTML = SVG[field.plantId];
                    contentEl.dataset.state = 'grown';
                    barEl.style.backgroundColor = '#FFC107'; // Yellow
                }
                timeEl.innerText = 'Erntebereit!';
            } else {
                if(contentEl.dataset.state !== 'growing') {
                    contentEl.innerHTML = SVG.sprout;
                    contentEl.dataset.state = 'growing';
                    barEl.style.backgroundColor = '#4CAF50'; // Green
                }
                timeEl.innerText = formatRemainingTime(daysRemaining);
            }
        }
    });

    // Animals Progress
    state.animals.forEach(a => {
        const barEl = document.getElementById(`animal-bar-${a.id}`);
        const timeEl = document.getElementById(`animal-time-${a.id}`);
        const countEl = document.getElementById(`prod-count-${a.id}`);
        if(barEl && timeEl && countEl) {
            const def = ANIMALS[a.type];
            const timeSinceProd = state.timeElapsedDays - a.lastProduced;
            const prog = Math.min(100, (timeSinceProd / def.cycle) * 100);
            const daysRemaining = def.cycle - timeSinceProd;

            barEl.style.width = `${prog}%`;
            timeEl.innerText = formatRemainingTime(daysRemaining);
            if(countEl.innerText !== (a.producedCount || 0).toString()) {
                countEl.innerText = a.producedCount || 0;
            }
        }
    });
}

function renderMachinesProgress() {
    const container = document.getElementById('machines-container');
    if(!container) return;

    if (state.machines.length === 0) {
        container.innerHTML = `<div class="col-span-full text-center text-gray-500 font-bold py-10">Keine Maschinen vorhanden.</div>`;
        return;
    }

    let html = '';
    state.machines.forEach((machineData) => {
        const def = MACHINES[machineData.type];
        const progress = Math.min(100, ((state.timeElapsedDays - machineData.lastProduced) / def.time) * 100);
        
        let hasInput = true;
        for (let inputId in def.input) {
            if ((state.inventory[inputId] || 0) < def.input[inputId]) { hasInput = false; break; }
        }

        const statusText = hasInput ? (progress >= 100 ? "Fertig!" : "Läuft...") : "Material fehlt";
        const statusColor = hasInput ? "text-green-600" : "text-red-500";

        html += `
            <div class="bg-white border-4 border-[#D4A373] rounded-2xl p-5 shadow-md">
                <div class="flex items-center gap-4 mb-4">
                    <div class="w-16 h-16 bg-gray-50 p-2 rounded-xl border-2 border-gray-200 shadow-inner">${SVG[def.id]}</div>
                    <div class="flex-1">
                        <h3 class="text-xl font-black text-[#5d4037]">${def.name}</h3>
                        <p class="text-sm font-bold ${statusColor}">${statusText}</p>
                    </div>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-3 mb-4 border border-gray-300">
                  <div class="bg-orange-500 h-full rounded-full" style="width: ${hasInput ? progress : 0}%"></div>
                </div>
                <div class="text-xs font-bold text-gray-600 grid grid-cols-2 gap-3">
                    <div class="bg-gray-50 p-2 rounded-xl border-2 border-gray-100">
                        <span class="uppercase block mb-1 text-gray-400">Eingang:</span>
                        ${Object.keys(def.input).map(k => `${def.input[k]}x ${ITEMS[k]?.name}`).join('<br>') || 'Nichts'}
                    </div>
                    <div class="bg-gray-50 p-2 rounded-xl border-2 border-gray-100">
                        <span class="uppercase block mb-1 text-gray-400">Ausgang:</span>
                        ${Object.keys(def.output).map(k => `${def.output[k]}x ${ITEMS[k]?.name}`).join('<br>')}
                    </div>
                </div>
            </div>
        `;
    });
    container.innerHTML = html;
}

/** --- INTERAKTIONEN --- */
window.handleFieldClick = function(fieldIdx) {
    const field = state.fields[fieldIdx];
    
    if (field.plantId) {
        const plant = PLANTS[field.plantId];
        if (state.timeElapsedDays >= field.plantedAt + plant.growTime) {
            addToInventory(field.plantId, plant.yield);
            field.plantId = null;
            document.getElementById(`field-content-${fieldIdx}`).dataset.state = 'empty'; // reset local visual state
            showNotification(`Ernte: + ${plant.yield}x ${plant.name}`, 'success');
            buildFarmStatic(); // Rebuild structure since we harvested
        } else {
            showNotification(`Wächst noch...`, 'info');
        }
    } else {
        openModal("Feld bepflanzen", generatePlantSelectionHTML(fieldIdx));
    }
}

function generatePlantSelectionHTML(fieldIdx) {
    let html = `<div class="grid grid-cols-1 md:grid-cols-2 gap-4">`;
    let hasAnySeed = false;
    for (let id in PLANTS) {
        const seedCount = state.seeds[id] || 0;
        if(seedCount > 0) {
            hasAnySeed = true;
            const p = PLANTS[id];
            html += `
                <button class="bg-green-500 hover:bg-green-600 text-white flex items-center p-3 rounded-xl shadow border-b-4 border-green-700 active:translate-y-1 active:border-b-0" 
                        onclick="plantSeed(${fieldIdx}, '${id}')">
                    <div class="w-10 h-10 mr-3 drop-shadow-md">${SVG[id]}</div>
                    <div class="text-left flex-1">
                        <div class="font-black text-lg">${p.name} pflanzen</div>
                        <div class="text-xs font-bold bg-green-700 px-2 py-1 rounded inline-block mt-1">${seedCount} Samen vorrätig</div>
                    </div>
                </button>
            `;
        }
    }
    if(!hasAnySeed) html += `<div class="col-span-full text-center py-4 font-bold text-gray-500">Du hast kein Saatgut im Inventar. Kaufe es zuerst im Shop!</div>`;
    
    const field = state.fields[fieldIdx];
    if (state.workersIdle > 0 && !field.workerAssigned) {
        html += `<div class="col-span-full mt-2 pt-4 border-t-2 border-[#D4A373]">
            <button onclick="assignWorker(${fieldIdx})" class="w-full bg-purple-500 hover:bg-purple-600 text-white font-black py-3 rounded-xl shadow border-b-4 border-purple-700 flex justify-center items-center">
                <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                Helfer zuweisen (${state.workersIdle} frei)
            </button>
        </div>`;
    } else if (field.workerAssigned) {
        html += `<div class="col-span-full mt-2 pt-4 border-t-2 border-[#D4A373]">
            <button onclick="removeWorker(${fieldIdx})" class="w-full bg-red-500 hover:bg-red-600 text-white font-black py-3 rounded-xl shadow border-b-4 border-red-700 flex justify-center items-center">
                <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                Helfer abziehen
            </button>
        </div>`;
    }
    html += `</div>`;
    return html;
}

window.plantSeed = function(fieldIdx, plantId) {
    if (state.seeds[plantId] > 0) {
        state.seeds[plantId]--;
        state.fields[fieldIdx].plantId = plantId;
        state.fields[fieldIdx].plantedAt = state.timeElapsedDays;
        closeModal();
        buildFarmStatic(); // Rebuild structure since we planted
    }
}

window.assignWorker = function(fieldIdx) {
    if (state.workersIdle > 0) {
        state.workersIdle--;
        state.fields[fieldIdx].workerAssigned = true;
        closeModal();
        buildFarmStatic();
    }
}

window.removeWorker = function(fieldIdx) {
    if (state.fields[fieldIdx].workerAssigned) {
        state.fields[fieldIdx].workerAssigned = false;
        state.workersIdle++;
        closeModal();
        buildFarmStatic();
    }
}

window.buySeed = function(plantId) {
    const p = PLANTS[plantId];
    if (state.money >= p.seedCost) {
        state.money -= p.seedCost;
        addSeed(plantId, 1);
        showNotification(`${p.name}-Samen gekauft!`, 'success');
    } else showNotification(`Nicht genug Geld!`, 'error');
}

window.buyAnimal = function(animalId) {
    const a = ANIMALS[animalId];
    if(a.max && state.animals.filter(an => an.type === animalId).length >= a.max) {
        showNotification(`Maximal ${a.max}x erlaubt!`, 'error'); return;
    }
    if (state.money >= a.cost) {
        state.money -= a.cost;
        state.animals.push({ id: 'a'+Date.now(), type: animalId, lastProduced: state.timeElapsedDays, producedCount: 0 });
        showNotification(`${a.name} gekauft!`, 'success');
    } else showNotification(`Nicht genug Geld!`, 'error');
}

window.sellAnimal = function(id) {
    const idx = state.animals.findIndex(a => a.id === id);
    if(idx > -1) {
        const type = state.animals[idx].type;
        const refund = ANIMALS[type].cost / 2;
        state.money += refund;
        state.animals.splice(idx, 1);
        showNotification(`${ANIMALS[type].name} verkauft für ${refund}€`, 'success');
        if(state.activeTab === 'farm') buildFarmStatic(); // Rebuild animal DOM
    }
}

window.buyMachine = function(machineId) {
    const m = MACHINES[machineId];
    if (state.money >= m.cost) {
        state.money -= m.cost;
        state.machines.push({ type: machineId, lastProduced: state.timeElapsedDays });
        showNotification(`${m.name} gebaut!`, 'success');
    } else showNotification(`Nicht genug Geld!`, 'error');
}

window.buyWorker = function() {
    if (state.money >= 200) {
        state.money -= 200;
        state.workersTotal++;
        state.workersIdle++;
        showNotification(`Helfer eingestellt!`, 'success');
        updateUI();
    } else showNotification(`Nicht genug Geld!`, 'error');
}

window.buyField = function() {
    const cost = calculateFieldCost();
    if (state.money >= cost) {
        state.money -= cost;
        state.fields.push({ id: state.fields.length, plantId: null, plantedAt: null, workerAssigned: false });
        showNotification(`Feld erweitert!`, 'success');
        renderContent(); 
    } else showNotification(`Brauche ${cost}€!`, 'error');
}

window.sellItem = function(itemId) {
    if (state.inventory[itemId] > 0) {
        state.inventory[itemId]--;
        state.money += ITEMS[itemId].sellPrice;
        renderContent();
    }
}

window.sellAll = function() {
    let totalEarned = 0;
    for (let id in state.inventory) {
        if (state.inventory[id] > 0) {
            totalEarned += state.inventory[id] * ITEMS[id].sellPrice;
            state.inventory[id] = 0;
        }
    }
    if(totalEarned > 0) {
        state.money += totalEarned;
        showNotification(`Verkauft für ${totalEarned}€!`, 'success');
        renderContent();
    } else showNotification(`Nichts zu verkaufen!`, 'info');
}

window.endStrike = function() {
    if(!state.strike) return showNotification(`Kein Streik!`, 'info');
    const debt = state.workersTotal * GAME_CONFIG.baseWorkerSalary;
    if(state.money >= debt) {
        state.money -= debt;
        state.strike = false;
        state.nextPayday = state.timeElapsedDays + 7;
        document.getElementById('worker-warning').style.display = 'none';
        showNotification(`Schulden bezahlt!`, 'success');
    } else showNotification(`Nicht genug Geld!`, 'error');
}

window.renameFarm = function() {
    const newName = prompt("Wie soll deine Farm heißen?", state.farmName);
    if(newName && newName.trim() !== '') {
        state.farmName = newName.trim();
        updateFarmNameUI();
    }
}

function openModal(title, content) {
    document.getElementById('modal-title').innerText = title;
    document.getElementById('modal-content').innerHTML = content;
    document.getElementById('modal').classList.remove('hidden');
}

window.closeModal = function() {
    document.getElementById('modal').classList.add('hidden');
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal').addEventListener('click', (e) => {
    if (e.target.id === 'modal') closeModal();
});

document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => changeTab(btn.dataset.tab));
});

const speedBtn = document.getElementById('btn-speed');
speedBtn.addEventListener('click', () => {
    if (state.timeScale === 1) {
        state.timeScale = 60; 
        speedBtn.innerText = "Zeitraffer: 60x (Admin)";
        speedBtn.classList.replace('bg-red-500', 'bg-yellow-500');
        speedBtn.classList.replace('border-red-700', 'border-yellow-600');
        showNotification("Zeitraffer aktiviert!", "info");
    } else {
        state.timeScale = 1;
        speedBtn.innerText = "Admin Zeitraffer";
        speedBtn.classList.replace('bg-yellow-500', 'bg-red-500');
        speedBtn.classList.replace('border-yellow-600', 'border-red-700');
        showNotification("Echtzeit aktiviert.", "info");
    }
});

function showNotification(msg, type) {
    const toast = document.createElement('div');
    toast.className = `fixed bottom-6 right-6 px-6 py-4 rounded-2xl shadow-2xl font-black text-white transform transition-all duration-300 translate-y-20 opacity-0 z-[200] border-b-4`;
    if(type === 'success') { toast.classList.add('bg-green-500', 'border-green-700'); }
    else if(type === 'error') { toast.classList.add('bg-red-500', 'border-red-700'); }
    else { toast.classList.add('bg-blue-500', 'border-blue-700'); }
    
    toast.innerText = msg;
    document.body.appendChild(toast);
    
    setTimeout(() => toast.classList.remove('translate-y-20', 'opacity-0'), 10);
    setTimeout(() => {
        toast.classList.add('translate-y-20', 'opacity-0');
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}

// Start
initFirebase();
updateFarmNameUI();
changeTab('farm');

</script>
